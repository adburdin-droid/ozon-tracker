<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Рекламный трекер — OZON</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{
  --ozon:#005BFF; --ozon-dark:#0047CC; --ozon-soft:#E8F0FF;
  --bg:#F1F3F8; --card:#FFFFFF; --ink:#10182B; --muted:#7A8295; --line:#E7EAF1;
  --leader:#F5A623; --excellent:#E0218A; --good:#22B473; --normal:#0FA3B1;
  --falling:#FF8A00; --unprofitable:#E5484D; --new:#8BC34A; --disabled:#A0A6B4;
  --up:#22B473; --down:#E5484D;
  --soil:#7B5230; --soil2:#6A4527; --soil-rim:#8C5E38;
  --r:16px; --r-sm:10px;
  --shadow:0 1px 2px rgba(16,24,43,.05),0 6px 20px rgba(16,24,43,.06);
  --shadow-h:0 4px 10px rgba(0,91,255,.10),0 16px 40px rgba(16,24,43,.12);
  --font:'Inter','Segoe UI',system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none}
.app{display:grid;grid-template-columns:236px 1fr;min-height:100vh}

/* ---------- Sidebar ---------- */
.side{background:var(--card);border-right:1px solid var(--line);padding:22px 16px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.logo{font-weight:800;font-size:26px;letter-spacing:-.5px;color:var(--ozon);line-height:1}
.logo span{color:var(--ink)}
.logo-sub{font-size:11px;color:var(--muted);margin-top:4px;font-weight:600;letter-spacing:.3px}
.nav{margin-top:28px;display:flex;flex-direction:column;gap:3px;flex:1}
.nav button{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:11px;color:#3a4257;font-weight:600;font-size:13.5px;width:100%;text-align:left;transition:.15s}
.nav button:hover{background:#F4F6FB;color:var(--ink)}
.nav button.active{background:var(--ozon-soft);color:var(--ozon)}
.nav button .ic{width:18px;height:18px;flex:none}
.nav .badge{margin-left:auto;background:var(--ozon);color:#fff;font-size:10.5px;font-weight:700;border-radius:20px;padding:1px 7px}
.nav button.active .badge{background:var(--ozon)}
.side-foot{border-top:1px solid var(--line);padding-top:14px;margin-top:10px;font-size:12px;color:var(--muted)}
.side-foot .row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.dot-live{width:8px;height:8px;border-radius:50%;background:var(--good);box-shadow:0 0 0 3px rgba(34,180,115,.18)}
.user{display:flex;align-items:center;gap:10px;margin-top:12px}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#FF8A00,#E0218A);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}

/* ---------- Main ---------- */
.main{padding:24px 30px 60px;max-width:1320px;width:100%}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:22px}
.h1{font-size:25px;font-weight:800;letter-spacing:-.4px;display:flex;align-items:center;gap:9px}
.h1 .info{width:18px;height:18px;color:var(--muted)}
.subtitle{color:var(--muted);font-size:13.5px;margin-top:3px}
.topbar-actions{display:flex;gap:10px;align-items:center}
.pill{display:inline-flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:9px 13px;font-weight:600;font-size:13px;color:#3a4257}
.pill svg{width:15px;height:15px;color:var(--muted)}
.btn-primary{background:var(--ozon);color:#fff;border-radius:11px;padding:10px 16px;font-weight:700;font-size:13px;display:inline-flex;align-items:center;gap:8px;transition:.15s;box-shadow:0 4px 14px rgba(0,91,255,.25)}
.btn-primary:hover{background:var(--ozon-dark)}
.btn-primary svg{width:15px;height:15px}
.btn-ghost{background:var(--card);border:1px solid var(--line);color:#3a4257;border-radius:11px;padding:9px 14px;font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:7px}
.btn-ghost:hover{border-color:var(--ozon);color:var(--ozon)}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
.card-pad{padding:18px}
.card-title{font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title .sm{font-size:12px;color:var(--muted);font-weight:600}

/* ---------- Bed cards (home top) ---------- */
.beds-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}
.bedcard{cursor:pointer;transition:.18s;position:relative;overflow:hidden}
.bedcard:hover{transform:translateY(-3px);box-shadow:var(--shadow-h)}
.bedcard .bc-head{display:flex;align-items:center;gap:10px;padding:16px 16px 0}
.bc-ic{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex:none}
.bc-ic svg{width:66%;height:66%;display:block;overflow:visible}
.bc-name{font-weight:800;font-size:14.5px;line-height:1.2}
.bc-sub{font-size:11.5px;color:var(--muted);font-weight:600}
.bc-count{padding:12px 16px 0;font-size:12.5px;color:var(--muted);font-weight:600}
.bc-count b{color:var(--ink)}
.bc-drr{padding:6px 16px 14px;display:flex;align-items:baseline;gap:8px}
.bc-drr .lbl{font-size:11.5px;color:var(--muted);font-weight:600}
.bc-drr .val{font-weight:800;font-size:16px}
.delta{font-size:12px;font-weight:700;display:inline-flex;align-items:center;gap:2px}
.delta.up{color:var(--up)} .delta.down{color:var(--down)}

/* ---------- The garden ---------- */
.garden{background:linear-gradient(180deg,#EAF3FF 0%,#F3F8FF 60%,#FBFCFE 100%);border:1px solid var(--line);border-radius:var(--r);padding:22px 22px 10px;margin-bottom:16px;position:relative;overflow:hidden}
.garden-sky{position:absolute;inset:0;background:radial-gradient(120% 80% at 80% -20%,rgba(255,210,120,.25),transparent 50%);pointer-events:none}
.planters{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;position:relative;z-index:1}
.planter{cursor:pointer;text-align:center;transition:.18s}
.planter:hover{transform:translateY(-4px)}
.planter:hover .planter-box{filter:drop-shadow(0 14px 22px rgba(123,82,48,.35))}
.planter-svg{width:100%;height:182px;display:block}
.planter-cap{margin-top:6px;font-weight:700;font-size:13px}
.planter-cap small{display:block;color:var(--muted);font-weight:600;font-size:11px}

.legend{display:flex;flex-wrap:wrap;gap:7px 16px;justify-content:center;padding:14px 10px 4px;position:relative;z-index:1}
.legend .lg{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:#3a4257}
.legend .lg svg{width:22px;height:24px}
.lg-click{cursor:pointer;border-radius:9px;padding:3px 9px;transition:background .15s}
.lg-click:hover{background:#eef2ff}
.lg-hint{flex-basis:100%;text-align:center;font-size:11px;color:var(--muted);font-weight:500;margin-top:2px}
.modal-ov{position:fixed;inset:0;background:rgba(15,23,42,.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal{background:#fff;border-radius:16px;max-width:440px;width:100%;box-shadow:0 24px 64px rgba(0,0,0,.28);overflow:hidden;animation:modalIn .16s ease}
@keyframes modalIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.modal-h{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:15px 18px;font-weight:800;font-size:15px;border-bottom:1px solid var(--line);color:var(--ink)}
.modal-x{border:none;background:#f1f3f7;border-radius:8px;width:28px;height:28px;cursor:pointer;font-size:12px;color:#667085;flex:none}
.modal-x:hover{background:#e6e9ef}
.modal-b{padding:16px 18px;font-size:13.5px;line-height:1.6;color:#374257}
.ch-note{font-size:11px;color:#8a93a6;line-height:1.45;margin-top:8px}
/* ===== Ретроспектива ===== */
.rdeck{max-width:1080px;margin:0 auto}
.rnav{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
.rnav-btn{border:1px solid var(--line);background:#fff;border-radius:10px;padding:9px 16px;font:inherit;font-size:13px;font-weight:700;color:var(--ozon);cursor:pointer}
.rnav-btn:hover:not(:disabled){border-color:var(--ozon)}
.rnav-btn:disabled{opacity:.4;cursor:default;color:#9AA3B0}
.rnav-mid{text-align:center;display:flex;flex-direction:column;gap:2px}
.rnav-ttl{font-weight:800;font-size:15px;color:var(--ink)}
.rnav-cnt{font-size:11.5px;color:var(--muted)}
.rstage{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:0 8px 30px rgba(20,40,80,.06);overflow:hidden}
.rslide{padding:30px 34px;min-height:520px}
.rdots{display:flex;gap:7px;justify-content:center;margin-top:16px;flex-wrap:wrap}
.rdot{width:9px;height:9px;border-radius:50%;background:#D4DAE6;cursor:pointer;transition:.15s}
.rdot.on{background:var(--ozon);transform:scale(1.25)}
.rdot:hover{background:#9AB0E0}
/* welcome */
.rwelcome{display:flex;flex-direction:column;justify-content:center;align-items:flex-start;min-height:520px;background:radial-gradient(1200px 400px at 0% 0%,#EAF1FF 0%,#fff 60%)}
.rw-kicker{font-size:13px;font-weight:700;color:var(--ozon);letter-spacing:.4px;text-transform:uppercase}
.rw-title{font-size:54px;font-weight:800;color:var(--ink);line-height:1.02;margin-top:14px}
.rw-title2{font-size:24px;font-weight:600;color:#5a6b86;margin-top:6px}
.rw-week{font-size:16px;color:#374257;margin-top:22px}
.rw-dirs{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
.rw-chip{font-size:13px;font-weight:700;color:#fff;background:var(--c);border-radius:999px;padding:6px 16px}
.rw-foot{font-size:13px;color:var(--muted);margin-top:34px}
/* slide head */
.rs-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
.rs-title{font-size:23px;font-weight:800;color:var(--ink);display:flex;align-items:center;gap:10px}
.rs-dot{width:12px;height:12px;border-radius:50%;display:inline-block}
.rs-sub{font-size:13px;color:var(--muted);margin-top:4px}
.rs-cap{font-size:12.5px;font-weight:700;color:#6b7689;text-transform:uppercase;letter-spacing:.3px;margin-bottom:12px}
.rs-two{display:grid;grid-template-columns:1.15fr .85fr;gap:26px;margin-top:22px}
.rs-col{min-width:0}
/* metric strip */
.rstrip{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
.rcard{background:#F7F9FC;border:1px solid #EDF1F7;border-radius:13px;padding:12px 13px}
.rcard-l{font-size:11px;color:var(--muted);font-weight:600}
.rcard-v{font-size:18px;font-weight:800;color:var(--ink);margin:3px 0 4px}
.rd{font-size:11.5px;font-weight:700}
.rd-n{color:#9AA3B0}
/* funnel */
.rfun{display:flex;flex-direction:column;align-items:center;gap:0}
.rfun-bar{height:46px;border-radius:10px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;color:#fff;box-shadow:0 3px 10px rgba(31,98,230,.18)}
.rfun-l{font-weight:700;font-size:13px}
.rfun-v{font-weight:700;font-size:13px;display:flex;gap:6px;align-items:center}
.rfun-v .rd{color:#fff !important;opacity:.92}
.rfun-cv{font-size:11.5px;color:#6b7689;padding:6px 0}
.rfun-cv b{color:#374257}
/* body metaphor */
.rbody{display:flex;gap:18px;align-items:center}
.rbody-svg{width:200px;height:auto;flex:none}
.rbody-pain{font-size:14px;color:var(--ink);margin-bottom:10px}
.rbody-remedy{font-size:13px;color:#374257;line-height:1.5;background:#FFF4E5;border:1px solid #FCE3BE;border-radius:11px;padding:11px 13px}
.rbody-note{font-size:12.5px;color:#7a4a00;background:#FFF8EC;border-radius:10px;padding:9px 12px;margin-top:10px;line-height:1.45}
.rbody-note.rb-ok{color:#15692f;background:#EBF8F0}
/* solutions table */
.rsol{width:100%;border-collapse:collapse;font-size:13px}
.rsol th{text-align:left;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;padding:8px 10px;border-bottom:2px solid var(--line)}
.rsol td{padding:11px 10px;border-bottom:1px solid #EEF1F7;vertical-align:top;color:#374257}
.rsol-sku{font-weight:600;color:var(--ink);white-space:nowrap}
.rsol-done,.rfin-act,.rbig{width:100%;box-sizing:border-box;border:1px solid var(--line);border-radius:9px;padding:7px 9px;font:inherit;font-size:12.5px;color:var(--ink);resize:vertical;min-height:40px}
.rsol-done:focus,.rfin-act:focus,.rbig:focus{outline:none;border-color:var(--ozon)}
.rbig{min-height:120px;line-height:1.5}
/* sku cards */
.rsku-list{display:flex;flex-direction:column;gap:12px}
.rsku{border:1px solid var(--line);border-radius:14px;padding:14px 16px;background:#fff}
.rsku-h{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.rsku-n{font-weight:700;font-size:13.5px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rsku-grid{display:grid;grid-template-columns:1fr 1fr 1.2fr;gap:16px}
.rblk-t{font-size:11px;font-weight:700;color:#6b7689;text-transform:uppercase;letter-spacing:.3px;margin-bottom:7px}
.rkv{display:flex;justify-content:space-between;gap:10px;padding:3px 0;font-size:12.5px;border-bottom:1px dashed #EEF1F7}
.rkv-l{color:var(--muted)}
.rkv-v{font-weight:600;color:var(--ink);white-space:nowrap}
.rblk-fin{background:#F7F9FC;border-radius:11px;padding:11px 12px}
.rfin-st{font-weight:800;font-size:13px;margin-bottom:5px}
.rfin-th{font-size:12.5px;color:#374257;line-height:1.45;margin-bottom:9px}
.rfin-al{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:4px}
/* tests */
.rtests{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.rtest-n{background:#F7F9FC;border:1px solid #EDF1F7;border-radius:11px;padding:10px}
.rtest-n label{display:block;font-size:11px;color:var(--muted);font-weight:600;margin-bottom:6px}
.rnum{width:100%;box-sizing:border-box;border:1px solid var(--line);border-radius:8px;padding:7px 9px;font:inherit;font-size:16px;font-weight:700;color:var(--ink)}
.rnum:focus{outline:none;border-color:var(--ozon)}
@media(max-width:920px){.rs-two,.rsku-grid{grid-template-columns:1fr}.rstrip{grid-template-columns:repeat(3,1fr)}.rbody{flex-direction:column}}
/* ===== Ретроспектива v2 ===== */
.rbm{display:flex;align-items:center;gap:8px;font-weight:800;font-size:16px}
.rbm-q{color:#12B886}.rbm-h{color:#FF7A2F}.rbm-sep{color:#D4DAE6;font-weight:400}
.rs-head .rbm{align-self:flex-start}
.rfr{display:flex;flex-direction:column;gap:8px}
.rfr-row{display:grid;grid-template-columns:30px 1fr auto auto;align-items:center;gap:12px;background:#F7F9FC;border:1px solid #EDF1F7;border-radius:12px;padding:11px 14px}
.rfr-ic{width:22px;height:22px;color:var(--ozon)}.rfr-ic svg{width:22px;height:22px}
.rfr-l{font-size:13px;color:#5a6b86;font-weight:600}
.rfr-v{font-size:17px;font-weight:800;color:var(--ink)}
.rfr-d{font-size:12px;font-weight:700;min-width:48px;text-align:right}
.rgauge{display:flex;flex-direction:column;align-items:center}
.rgauge svg{width:180px}.rgauge-lab{font-size:12px;font-weight:800;letter-spacing:.5px;margin-top:-6px}
.rkpi{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.rkpi-c{background:#F7F9FC;border:1px solid #EDF1F7;border-radius:12px;padding:11px 13px}
.rkpi-l{font-size:11px;color:var(--muted);font-weight:600}
.rkpi-v{font-size:19px;font-weight:800;color:var(--ink);margin:2px 0 3px}
.rdr-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.rdr-t{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;margin-bottom:7px}
.rdr-t.up{color:#16A34A}.rdr-t.dn{color:#E5484D}
.rdr-i{display:flex;align-items:center;gap:6px;font-size:12px;color:#374257;padding:2px 0}
.rdr-i span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rev{display:flex;flex-direction:column;gap:7px}
.rev-i{display:flex;align-items:center;gap:8px;font-size:12.5px;color:#374257}
.rev-ar{font-size:11px;font-weight:800}.rev-ar.up{color:#16A34A}.rev-ar.dn{color:#E5484D}
.rcontrib{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.rcb-h{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.3px;margin-bottom:10px}
.rcb-h.up,.rs-cap.up2{color:#16A34A}.rcb-h.dn,.rs-cap.dn2{color:#E5484D}
.rcb{display:grid;grid-template-columns:140px 1fr auto;align-items:center;gap:10px;margin-bottom:9px}
.rcb-n{font-size:12px;color:var(--ink);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rcb-track{height:14px;background:#F0F3F8;border-radius:7px;overflow:hidden}
.rcb-fill{height:100%;border-radius:7px}.rcb-fill.up{background:linear-gradient(90deg,#7BD389,#16A34A)}.rcb-fill.dn{background:linear-gradient(90deg,#F3A0A0,#E5484D)}
.rcb-v{font-size:12px;font-weight:700;white-space:nowrap}.rcb-v.up{color:#16A34A}.rcb-v.dn{color:#E5484D}
.rdonut-wrap{display:flex;align-items:center;gap:20px}
.rdonut{width:130px;height:130px;flex:none}
.rtl-list{display:flex;flex-direction:column;gap:8px}
.rtl{display:flex;align-items:center;gap:7px;font-size:12.5px;color:#374257}
.rtl-d{width:11px;height:11px;border-radius:3px;display:inline-block}.rtl b{margin-left:4px;color:var(--ink)}
.rbub svg{width:100%;height:auto;background:#FBFCFE;border:1px solid #EEF1F7;border-radius:14px}
.rbub-leg{display:flex;gap:16px;flex-wrap:wrap;margin-top:10px;align-items:center}
.rbub-note{font-size:11px;color:var(--muted)}
.rteam-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.rteam-n{background:#F7F9FC;border:1px solid #EDF1F7;border-radius:12px;padding:12px}
.rteam-n label{display:block;font-size:11px;color:var(--muted);font-weight:600;margin-bottom:7px}
.rteam-foot{text-align:center;font-size:13px;font-weight:700;color:var(--ozon);margin-top:22px}
.rquad{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.rq{border:1.5px solid var(--c);border-radius:14px;padding:14px;background:#FBFCFE}
/* печать / экспорт ретро */
#rprint{display:none}
@media print{
  @page{size:A4 landscape;margin:8mm}
  body>*:not(#rprint){display:none!important}
  #rprint{display:block!important}
  .rprint-page{page-break-after:always}
  .rprint-page:last-child{page-break-after:auto}
  .rprint-page .rstage{box-shadow:none!important;border:1px solid #eee!important}
  #rprint textarea,#rprint input{border:none!important;resize:none;color:#1A2B45!important;background:transparent!important}
  .rsku,.rq,.rfr-row,.rcb,.rkpi-c,.rsol tr{page-break-inside:avoid}
}
.rexp{display:flex;gap:8px}
.rexp-btn{border:1px solid var(--ozon);background:var(--ozon);color:#fff;border-radius:9px;padding:8px 14px;font:inherit;font-size:12.5px;font-weight:700;cursor:pointer}
.rexp-btn.ghost{background:#fff;color:var(--ozon)}
.rexp-btn:hover{opacity:.92}
.rexp-btn:disabled{opacity:.5;cursor:default}
/* панель инструментов ретро */
.rnav{flex-wrap:wrap;gap:10px}
.rtools{display:flex;gap:8px;align-items:center;flex:1;justify-content:center}
.rnav2{text-align:center;margin:-6px 0 12px}
.rnav2 .rnav-ttl{font-size:15px}.rnav2 .rnav-cnt{margin-left:8px}
.rtool-btn{border:1px solid var(--line);background:#fff;border-radius:9px;padding:8px 13px;font:inherit;font-size:12.5px;font-weight:600;color:#344256;cursor:pointer;white-space:nowrap}
.rtool-btn:hover{border-color:var(--ozon);color:var(--ozon)}
.rtool-btn.accent{background:#16A34A;border-color:#16A34A;color:#fff}
.rtool-btn.accent:hover{opacity:.92;color:#fff}
.rxls{position:relative}
.rxls-menu{display:none;position:absolute;top:calc(100% + 6px);left:0;z-index:50;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 16px 44px rgba(20,40,80,.16);padding:6px;min-width:280px}

.rxls-h{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.3px;padding:6px 10px}
.rxls-menu button{display:block;width:100%;text-align:left;border:none;background:#fff;border-radius:8px;padding:9px 10px;font:inherit;font-size:13px;font-weight:700;color:var(--ink);cursor:pointer}
.rxls-menu button span{display:block;font-size:11px;font-weight:500;color:var(--muted);margin-top:2px}
.rxls-menu button:hover{background:#EEF4FF}
/* режим трансляции */
#rpres{position:fixed;inset:0;background:#fff;z-index:2000;display:flex;flex-direction:column;overflow:auto}
.rpres-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 18px;font-size:13px;color:#667085;border-bottom:1px solid var(--line);flex:none}
#rpx{border:1px solid var(--line);background:#fff;border-radius:8px;padding:7px 13px;cursor:pointer;font:inherit;font-size:12.5px;font-weight:600}
#rpx:hover{border-color:#E5484D;color:#E5484D}
.rpres-stage{flex:1;display:flex;align-items:center;justify-content:center;padding:22px}
.rpres-stage .rstage{width:100%;max-width:1200px;border:1px solid var(--line);box-shadow:0 12px 44px rgba(20,40,80,.12)}
.rpres-nav{position:fixed;bottom:22px;right:26px;display:flex;gap:12px}
.rpres-nav button{width:48px;height:48px;border-radius:50%;border:none;background:var(--ozon);color:#fff;font-size:20px;cursor:pointer;box-shadow:0 6px 18px rgba(31,98,230,.32)}
.rpres-nav button:disabled{opacity:.35;cursor:default}
.rq-h{font-size:14px;font-weight:800;color:var(--c);margin-bottom:9px}
.rq-ta{width:100%;box-sizing:border-box;border:1px solid var(--line);border-radius:10px;padding:9px 11px;font:inherit;font-size:12.5px;min-height:90px;resize:vertical;color:var(--ink)}
.rq-ta:focus{outline:none;border-color:var(--c)}
.rnext{display:flex;flex-direction:column;gap:12px;max-width:760px}
.rnext-i{display:flex;align-items:center;gap:14px}
.rnext-n{width:34px;height:34px;flex:none;border-radius:50%;background:var(--ozon);color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:15px}
.rnext-foot{font-size:11px;color:var(--muted);margin-top:22px}
.rin{flex:1;border:1px solid var(--line);border-radius:9px;padding:9px 12px;font:inherit;font-size:13px;color:var(--ink)}
.rin:focus{outline:none;border-color:var(--ozon)}.rin-s{flex:none;width:110px}
.rbig-tall{min-height:280px}
.rsol-dec td{vertical-align:middle}
.rsol-dec input{width:100%;box-sizing:border-box}
/* welcome v2 */
.rw-top{margin-bottom:18px}
.rw-period{font-size:15px;color:#374257;margin-top:20px}
.rw-hl{display:flex;gap:34px;margin-top:22px}
.rw-hlv{font-size:34px;font-weight:800}
.rw-hll{font-size:13px;color:var(--muted)}
@media(max-width:920px){.rcontrib,.rkpi,.rquad,.rteam-grid{grid-template-columns:1fr}.rcb{grid-template-columns:110px 1fr auto}}

/* ---------- Bottom home grid ---------- */
.home-grid{display:grid;grid-template-columns:1fr 1.7fr;gap:14px}
.metric{margin-bottom:14px}
.metric .m-lbl{font-size:11.5px;color:var(--muted);font-weight:600}
.metric .m-val{font-size:21px;font-weight:800;letter-spacing:-.4px;display:flex;align-items:baseline;gap:8px}
.metric:last-child{margin-bottom:0}
.linkbtn{margin-top:6px;width:100%;background:var(--ozon-soft);color:var(--ozon);border-radius:11px;padding:11px;font-weight:700;font-size:13px;transition:.15s}
.linkbtn:hover{background:#D9E6FF}

/* recommendations feed */
.rec{border-radius:12px;padding:13px;margin-bottom:10px;display:flex;gap:11px;align-items:flex-start}
.rec.scale{background:#EAFBF1;border:1px solid #BFEBD2}
.rec.opt{background:#FFF1E8;border:1px solid #FAD6BE}
.rec.crit{background:#FDECEC;border:1px solid #F6CBCC}
.rec .rec-ic{width:30px;height:34px;flex:none}
.rec .rec-tag{font-weight:800;font-size:12px;margin-bottom:2px}
.rec.scale .rec-tag{color:#138a4e}.rec.opt .rec-tag{color:#cc6a16}.rec.crit .rec-tag{color:#c93539}
.rec .rec-txt{font-size:12.5px;color:#374257;line-height:1.4}
.rec .rec-txt b{font-weight:700}
.rec .rec-go{margin-left:auto;align-self:center;color:var(--muted);flex:none}

/* ---------- Detail (bed) ---------- */
.back{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-weight:600;font-size:13px;margin-bottom:14px}
.back:hover{color:var(--ozon)}
.detail-head{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:18px}
.detail-title{display:flex;align-items:center;gap:13px}
.detail-title .bc-ic{width:46px;height:46px;border-radius:13px}
.detail-title h2{font-size:21px;font-weight:800;letter-spacing:-.3px}
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:0;border:1px solid var(--line);border-radius:var(--r);background:var(--card);overflow:hidden;margin-bottom:16px}
.kpi{padding:16px 18px;border-right:1px solid var(--line)}
.kpi:last-child{border-right:none}
.kpi .k-val{font-size:20px;font-weight:800;letter-spacing:-.3px;display:flex;align-items:baseline;gap:7px}
.kpi .k-lbl{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:3px}

.split{display:grid;grid-template-columns:1.6fr 1fr;gap:14px;margin-bottom:16px}
.statrow{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)}
.statrow:last-child{border-bottom:none}
.statrow .sw{width:9px;height:9px;border-radius:3px;flex:none}
.statrow .nm{font-weight:600;font-size:13px}
.statrow .ct{margin-left:auto;font-weight:700}
.statrow .pc{color:var(--muted);font-weight:600;font-size:12px;width:42px;text-align:right}

/* campaign table */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:right;color:var(--muted);font-weight:600;font-size:11.5px;padding:9px 10px;border-bottom:1px solid var(--line);white-space:nowrap}
.tbl th:first-child,.tbl td:first-child{text-align:left}
.tbl td{padding:11px 10px;border-bottom:1px solid #F0F2F7;white-space:nowrap}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr{cursor:pointer;transition:.12s}
.tbl tbody tr:hover{background:#F6F9FF}
.camp-name{display:flex;align-items:center;gap:10px}
.camp-name .pl{width:26px;height:30px;flex:none}
.camp-name .nm{font-weight:600;max-width:340px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cm-note{font-size:11px;color:#6b7689;margin:4px 0 0 36px;max-width:360px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cm-box textarea{width:100%;box-sizing:border-box;border:1px solid var(--line);border-radius:10px;padding:9px 11px;font:inherit;font-size:13px;resize:vertical;min-height:60px;color:var(--ink);background:#fff}
.cm-box textarea:focus{outline:none;border-color:var(--ozon)}
.cm-row{display:flex;gap:10px;align-items:center;margin-top:8px}
.cm-save{background:var(--ozon);color:#fff;border:none;border-radius:9px;padding:7px 16px;font-weight:700;font-size:13px;cursor:pointer}
.cm-hint{font-size:11.5px;color:var(--muted)}
.wk-row{display:flex;flex-wrap:wrap;gap:6px;margin:2px 0 10px}
.wk{border:1px solid var(--line);background:#fff;color:#4a5568;border-radius:8px;padding:5px 10px;font-size:11.5px;font-weight:600;cursor:pointer;white-space:nowrap}
.wk:hover{border-color:var(--ozon);color:var(--ozon)}
.wk.on{background:var(--ozon);color:#fff;border-color:var(--ozon)}
.cl-controls{display:flex;flex-wrap:wrap;align-items:center;gap:10px}
.cl-search{flex:1;min-width:200px;border:1px solid var(--line);border-radius:10px;padding:9px 12px;font:inherit;font-size:13px;color:var(--ink)}
.cl-search:focus{outline:none;border-color:var(--ozon)}
.cl-lbl{font-size:12.5px;color:var(--muted);font-weight:600}
.cl-select{border:1px solid var(--line);border-radius:10px;padding:8px 10px;font:inherit;font-size:13px;font-weight:600;color:var(--ink);background:#fff;cursor:pointer}
.cl-dir{border:1px solid var(--line);background:#fff;border-radius:10px;padding:8px 12px;font:inherit;font-size:13px;font-weight:700;color:var(--ozon);cursor:pointer;white-space:nowrap}
.cl-dir:hover{border-color:var(--ozon)}
.cl-clear{border:1px solid var(--line);background:#fff;border-radius:10px;padding:8px 12px;font:inherit;font-size:13px;font-weight:600;color:#667085;cursor:pointer;white-space:nowrap}
.cl-clear:hover{border-color:#E5484D;color:#E5484D}
.cl-count{font-size:12px;color:var(--muted);margin-top:10px}
.cl-bed{display:inline-block;font-size:11.5px;font-weight:700;color:#46506a;background:#eef1f6;border-radius:7px;padding:2px 8px}
.cl-tbl th[data-k]:hover{color:var(--ozon)}
.arch-row{border-top:1px solid var(--line);padding:12px 0}
.arch-row:first-of-type{border-top:none}
.arch-head{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:8px}
.arch-meta{font-size:12px;color:var(--muted)}
.arch-cm{margin-top:8px}
.arch-cm textarea{min-height:46px}
.badge-st{display:inline-flex;align-items:center;gap:6px;padding:4px 9px;border-radius:20px;font-size:11.5px;font-weight:700}
.spark{display:inline-block;vertical-align:middle}

/* campaign detail */
.cd-metrics{display:grid;grid-template-columns:repeat(6,1fr);gap:0;border:1px solid var(--line);border-radius:var(--r);overflow:hidden;background:var(--card);margin-bottom:16px}
.cd-metric{padding:15px 16px;border-right:1px solid var(--line)}
.cd-metric:last-child{border-right:none}
.cd-metric .v{font-size:19px;font-weight:800;letter-spacing:-.3px}
.cd-metric .l{font-size:11px;color:var(--muted);font-weight:600;margin-top:2px}
.cd-metric .d{font-size:11.5px;font-weight:700;margin-top:3px}
.timeline{position:relative;padding-left:8px}
.tl-item{display:flex;gap:11px;padding:9px 0;align-items:flex-start}
.tl-item .tl-dot{width:22px;height:22px;border-radius:50%;background:var(--ozon-soft);color:var(--ozon);display:flex;align-items:center;justify-content:center;flex:none}
.tl-item .tl-d{font-size:11.5px;color:var(--muted);font-weight:600}
.tl-item .tl-t{font-size:13px;font-weight:600}

.cmp-box{background:#EAFBF1;border:1px solid #BFEBD2;border-radius:12px;padding:14px;margin-bottom:12px}
.cmp-box.warn{background:#FFF1E8;border-color:#FAD6BE}
.cmp-box.bad{background:#FDECEC;border-color:#F6CBCC}
.cmp-tag{font-weight:800;font-size:13px;display:flex;align-items:center;gap:7px;margin-bottom:5px}
.cmp-stats{display:flex;gap:26px;margin-top:12px}
.cmp-stats .cs .v{font-size:20px;font-weight:800}
.cmp-stats .cs .l{font-size:11px;color:var(--muted);font-weight:600}

/* uploads */
.drop{border:2px dashed #C5D4F2;border-radius:var(--r);background:#FAFCFF;padding:38px;text-align:center;transition:.18s;cursor:pointer}
.drop.drag{border-color:var(--ozon);background:var(--ozon-soft)}
.drop h3{font-size:16px;font-weight:800;margin:12px 0 5px}
.drop p{color:var(--muted);font-size:13px}
.snap-item{display:flex;align-items:center;gap:13px;padding:13px 15px;border:1px solid var(--line);border-radius:12px;margin-bottom:9px;transition:.12s;cursor:pointer}
.snap-item:hover{border-color:var(--ozon);background:#F8FAFF}
.snap-item.cur{border-color:var(--ozon);background:var(--ozon-soft)}
.snap-item .sn-d{width:38px;height:38px;border-radius:10px;background:var(--ozon-soft);color:var(--ozon);display:flex;align-items:center;justify-content:center;flex:none}
.tag-new{background:var(--good);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px}
.tag-base{background:#EEF1F6;color:var(--muted);font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(40px);background:var(--ink);color:#fff;padding:13px 20px;border-radius:12px;font-weight:600;font-size:13.5px;box-shadow:0 12px 40px rgba(0,0,0,.3);opacity:0;transition:.3s;z-index:100;display:flex;align-items:center;gap:9px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:#C93539}

.chart-tabs{display:flex;gap:6px}
.chart-tabs button{font-size:12px;font-weight:600;padding:5px 11px;border-radius:8px;background:#F1F3F8;color:#5a6377}
.chart-tabs button.on{background:var(--ozon);color:#fff}
.lg-line{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:#5a6377;font-weight:600;margin-right:12px}
.lg-line i{width:14px;height:3px;border-radius:3px;display:inline-block}

.empty{text-align:center;color:var(--muted);padding:40px;font-size:13px}
.fade-in{animation:fade .4s ease both}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes grow{from{transform:scaleY(.2);opacity:0}to{transform:scaleY(1);opacity:1}}

@media(max-width:1100px){.beds-row,.planters{grid-template-columns:repeat(2,1fr)}.home-grid{grid-template-columns:1fr}.kpis,.cd-metrics{grid-template-columns:repeat(3,1fr)}.split{grid-template-columns:1fr}}
@media(max-width:760px){.app{grid-template-columns:1fr}.side{position:static;height:auto;flex-direction:row;flex-wrap:wrap;align-items:center}.nav{flex-direction:row;flex-wrap:wrap;margin-top:0}.nav .badge{display:none}.side-foot,.user{display:none}.beds-row{grid-template-columns:1fr 1fr}.kpis,.cd-metrics{grid-template-columns:repeat(2,1fr)}}
/* ===== Рекламный трекер (черновик) ===== */

.trk-sub{font-size:13px;font-weight:500;color:var(--muted);margin-left:8px}
.trk-warn{background:#FFF8EC;border:1px solid #FCE3BE;color:#7a4a00;border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:14px}
.trk-funnel{display:flex;align-items:center;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.trk-fn{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-left:4px solid var(--c);border-radius:10px;padding:8px 14px;font-weight:700;font-size:13px;color:var(--ink)}
.trk-fn-n{width:20px;height:20px;border-radius:50%;background:var(--c);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px}
.trk-fn-ar{color:#cbd5e6;font-weight:800}
.trk-block{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px 20px;margin-bottom:16px}
.trk-bh{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:800;color:var(--ink);margin-bottom:14px}
.trk-bn{width:24px;height:24px;border-radius:50%;background:var(--c);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;flex:none}
.trk-bhs{font-size:12px;font-weight:500;color:var(--muted)}
.trk-beds{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px}
.trk-bed{text-align:left;border:1px solid var(--line);border-radius:12px;padding:13px;background:#F9FBFD;cursor:pointer;font:inherit}
.trk-bed:hover{border-color:var(--ozon);box-shadow:0 4px 14px rgba(31,98,230,.08)}
.trk-bed-t{font-weight:700;font-size:13.5px;color:var(--ink)}
.trk-bed-drr{font-size:12px;color:var(--muted);margin:4px 0 9px}
.trk-bed-bar{display:flex;height:8px;border-radius:5px;overflow:hidden;background:#EEF1F7}
.trk-bed-bar span{display:block;height:100%}
.trk-st{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.trk-st-c{border:1px solid var(--line);border-top:3px solid var(--c);border-radius:12px;padding:14px}
.trk-st-n{font-size:30px;font-weight:800;color:var(--c);line-height:1}
.trk-st-l{font-weight:700;color:var(--ink);margin-top:2px}
.trk-st-p{font-size:12px;color:var(--muted)}
.trk-st-h{font-size:11px;color:#7a8395;margin-top:9px;line-height:1.5;border-top:1px dashed var(--line);padding-top:8px}
.trk-worklist{display:flex;flex-direction:column;gap:12px}
.trk-wc{border:1px solid var(--line);border-radius:12px;padding:13px 15px;background:#fff}
.trk-wc-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.trk-wc-n{font-weight:700;font-size:13.5px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.trk-wc-bed{font-size:11px;color:var(--muted);background:#EEF1F7;border-radius:6px;padding:2px 7px;flex:none}
.trk-wc-top .badge-st{margin-left:auto;flex:none}
.trk-wc-m{display:flex;flex-wrap:wrap;gap:14px;font-size:12px;color:var(--muted);margin-bottom:7px}
.trk-m b{color:var(--ink)}
.trk-wc-sbt{font-size:11px;color:#7a8395;background:#F7F9FC;border-radius:7px;padding:6px 9px;margin-bottom:9px}
.trk-wc-cm{width:100%;box-sizing:border-box;border:1px solid var(--line);border-radius:9px;padding:8px 10px;font:inherit;font-size:13px;min-height:48px;resize:vertical;color:var(--ink)}
.trk-wc-cm:focus{outline:none;border-color:var(--ozon)}
.trk-wc-act{display:flex;align-items:center;gap:10px;margin-top:9px}
.trk-btn{border:none;border-radius:9px;padding:8px 15px;font:inherit;font-size:13px;font-weight:700;cursor:pointer;color:#fff}
.trk-btn.restart{background:#E5484D}.trk-btn.keep{background:#2D7CFF}

.trk-wc-hint{font-size:11px;color:var(--muted)}
.trk-buckets{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}
.trk-bucket{background:#F9FBFD;border:1px solid var(--line);border-radius:12px;padding:12px}
.trk-bucket-h{font-size:12.5px;font-weight:800;margin-bottom:8px}

.trk-dr-n{font-weight:700;color:var(--ink)}
.trk-dr-move{color:var(--muted)}
.trk-up{color:#16A34A;font-weight:700}
.trk-dr-act{margin-left:auto;font-weight:700;color:#475067}

.trk-dr-cm{font-size:12px;color:#475067;margin-top:5px}
.trk-empty{color:var(--muted);font-size:13px;padding:14px;text-align:center}

.rules-card .rules-note{font-size:12.5px;color:#475067;line-height:1.6;margin-bottom:14px}
.rules-head{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:10px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--muted);padding:0 0 8px;border-bottom:2px solid var(--line)}

.rule-m{font-weight:600;font-size:13px;color:var(--ink)}
.rule-nd{font-size:10px;color:#fff;background:#9AA3B0;border-radius:5px;padding:1px 6px;font-weight:600}
.rule-in label{display:block;font-size:10px;color:var(--muted);margin-bottom:3px}
.rule-in input{width:100%;box-sizing:border-box;border:1px solid var(--line);border-radius:8px;padding:7px 9px;font:inherit;font-size:13px}

const ST = {
  success: {label:'Успешная',  color:'#16A34A', plant:'bloom'},
  stable:  {label:'Стабильная', color:'#2D7CFF', plant:'sprout'},
  loss:    {label:'Плохая',  color:'#E5484D', plant:'dead'},
  archived:{label:'В архиве',   color:'#9AA3B0', plant:'empty'},
};
const ST_ORDER=['success','stable','loss'];
/* ДРР-пороги (правится в одном месте): <25 — стабильная, 25–30 — успешная, >30 — убыточная */
const BedTargets={
  KEY:'tracker_bed_targets_v1',
  DEF:{ozk:{ok:25,hi:30},ozz:{ok:100,hi:130},media:{ok:50,hi:70},vk:{ok:25,hi:30}},
  load(){try{return Object.assign({},this.DEF,JSON.parse(localStorage.getItem(this.KEY))||{});}catch(e){return Object.assign({},this.DEF);}},
  get(key){const o=this.load();return o[key]||this.DEF[key]||{ok:25,hi:30};},
  set(key,ok,hi){const o=this.load();o[key]={ok:+ok||0,hi:+hi||0};try{localStorage.setItem(this.KEY,JSON.stringify(o));}catch(e){}},
  reset(){try{localStorage.removeItem(this.KEY);}catch(e){}}
};
const StockCfg={
  KEY:'tracker_stock_threshold_v1',
  get(){const v=+localStorage.getItem(this.KEY);return v>0?v:14;},
  set(v){try{localStorage.setItem(this.KEY,String(+v||14));}catch(e){}}
};
const BrandOverride={
  KEY:'tracker_brand_override_v1',
  load(){try{return JSON.parse(localStorage.getItem(this.KEY))||{};}catch(e){return {};}},
  get(art){return art?(this.load()[String(art).toLowerCase()]||null):null;},
  set(art,brand){const o=this.load();if(brand)o[String(art).toLowerCase()]=brand;else delete o[String(art).toLowerCase()];try{localStorage.setItem(this.KEY,JSON.stringify(o));}catch(e){}}
};
function brandOverrideListHTML(){const o=BrandOverride.load(),ks=Object.keys(o);
  return ks.length?`<div class="cfg-ovlist">${ks.map(a=>`<span class="cfg-ov">${esc(a)} → <b>${o[a]}</b> <button data-art="${esc(a)}" class="cfg-ov-x" title="Удалить">✕</button></span>`).join('')}</div>`:'<div class="rules-note" style="margin:6px 0 0">Пока правок нет.</div>';}
function trkSettingsHTML(){
  const bt=BedTargets.load();
  const bedRow=(k,label)=>`<div class="cfg-row"><span class="cfg-bed">${label}</span>
    <label class="cfg-lbl">Успешная при ДРР ≤ <input type="number" class="cfg-in" data-bed="${k}" data-f="ok" value="${bt[k].ok}"> %</label>
    <label class="cfg-lbl">Плохая при ДРР > <input type="number" class="cfg-in" data-bed="${k}" data-f="hi" value="${bt[k].hi}"> %</label></div>`;

    <div class="card-title">Целевой ДРР по блокам</div>
    <div class="rules-note">Статус кампании: ДРР ≤ «Успешная» → <b>Успешная</b>; между порогами → <b>Стабильная</b>; ДРР > «Плохая» → <b>Плохая</b>. У ОЗЗ (оплата за заказ) ДРР естественно выше — поэтому для него порог больше.</div>
    ${bedRow('ozk','ОЗК')}${bedRow('ozz','ОЗЗ')}${bedRow('media','Медийная')}${bedRow('vk','VK')}
    <div class="rules-actions"><button class="btn-primary" id="cfgSave">Сохранить и пересчитать статусы</button><button class="btn-ghost" id="cfgReset">Сбросить к стандартным</button></div>
  </div>
  <div class="card card-pad" style="margin-bottom:14px">
    <div class="card-title">Порог остатков</div>
    <div class="rules-note">На сколько дней запаса подсвечивать товар красным (риск out-of-stock) — в разделе «Доступность» и в карточках РК.</div>
    <div class="cfg-row"><span class="cfg-bed">Красным, если хватит менее</span><input type="number" class="cfg-in" id="cfgStock" value="${StockCfg.get()}"> <span>дней</span><button class="btn-primary" id="cfgStockSave" style="margin-left:10px">Сохранить</button></div>
  </div>
  <div class="card card-pad" style="margin-bottom:14px">
    <div class="card-title">Ручная правка бренда у SKU</div>
    <div class="rules-note">Если артикул автоматически отнесён не к тому бренду (qeep/Harly) — задайте вручную.</div>
    <div class="cfg-row"><input class="cfg-in wide" id="cfgArt" placeholder="артикул, напр. qeep_arginine_90caps"><select id="cfgBrand" class="cfg-in"><option value="qeep">qeep</option><option value="Harly">Harly</option></select><button class="btn-ghost" id="cfgBrandSave">Задать</button></div>
    <div id="cfgBrandList">${brandOverrideListHTML()}</div>
  </div>`;
}
function wireTrkSettings(root){
  const save=root.querySelector('#cfgSave');if(save)save.onclick=()=>{const beds={};root.querySelectorAll('.cfg-in[data-bed]').forEach(i=>{const k=i.getAttribute('data-bed'),f=i.getAttribute('data-f');beds[k]=beds[k]||{};beds[k][f]=+i.value;});Object.keys(beds).forEach(k=>BedTargets.set(k,beds[k].ok,beds[k].hi));prepBeds(STATE.snap);toast('Целевой ДРР сохранён — статусы пересчитаны');go('tracker');};
  const reset=root.querySelector('#cfgReset');if(reset)reset.onclick=()=>{BedTargets.reset();prepBeds(STATE.snap);toast('Сброшено к стандартным');go('settings');};
  const ss=root.querySelector('#cfgStockSave');if(ss)ss.onclick=()=>{StockCfg.set(+root.querySelector('#cfgStock').value);_stockMap=null;toast('Порог остатков сохранён');go('settings');};
  const bs=root.querySelector('#cfgBrandSave');if(bs)bs.onclick=()=>{const a=(root.querySelector('#cfgArt').value||'').trim(),br=root.querySelector('#cfgBrand').value;if(!a){toast('Введите артикул',true);return;}BrandOverride.set(a,br);prepBeds(STATE.snap);_stockMap=null;toast('Бренд задан');go('settings');};
  root.querySelectorAll('.cfg-ov-x').forEach(b=>b.onclick=()=>{BrandOverride.set(b.getAttribute('data-art'),null);prepBeds(STATE.snap);_stockMap=null;toast('Правка удалена');go('settings');});
}

const DRR_OK_LOW=25, DRR_OK_HIGH=30;

/* ---------- helpers ---------- */
const fmt = n => n==null?'—':Math.round(n).toLocaleString('ru-RU');
const money = n => n==null?'—':Math.round(n).toLocaleString('ru-RU')+' ₽';
const pct = n => n==null?'—':(Math.round(n*10)/10).toLocaleString('ru-RU')+'%';
const f1 = n => n==null?'—':(Math.round(n*10)/10).toLocaleString('ru-RU');
function kshort(n){ if(n==null)return'—'; if(Math.abs(n)>=1e6)return (n/1e6).toFixed(n%1e6===0?0:1).replace('.',',')+'M'; if(Math.abs(n)>=1e3)return Math.round(n/1e3)+'K'; return Math.round(n);}
const el = (t,c,h)=>{const e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e;};
function toast(msg,err){const t=document.getElementById('toast');t.className='toast show'+(err?' err':'');t.innerHTML=msg;setTimeout(()=>t.className='toast',3200);}

/* ============================================================
   SVG PLANTS — each status renders a distinct plant.
   Healthy statuses bloom; poor statuses wilt; disabled = bare soil.
   ============================================================ */
function plant(status,scale){
  scale=scale||1;
  const c=ST[status]?ST[status].color:'#A0A6B4';
  const P={
    sunflower:`<g><path d="M16 46 V20" stroke="#3DA35D" stroke-width="2.4"/><path d="M16 32 q-7 -2 -9 -8 q7 -1 9 5z" fill="#3DA35D"/><path d="M16 26 q7 -2 9 -8 q-7 -1 -9 5z" fill="#4DB36B"/>${petals(16,15,7,12,c)}<circle cx="16" cy="15" r="4.6" fill="#7A4A14"/></g>`,
    bloom:`<g><path d="M16 46 V22" stroke="#3DA35D" stroke-width="2.2"/><path d="M16 34 q-7 -1 -9 -7 q7 -1 9 4z" fill="#3DA35D"/>${petals(16,17,6,11,c)}<circle cx="16" cy="17" r="3.6" fill="#FFD23F"/></g>`,
    tulip:`<g><path d="M16 46 V24" stroke="#3DA35D" stroke-width="2.2"/><path d="M16 32 q-8 0 -10 -7 q8 -1 10 4z" fill="#46B36A"/><path d="M16 30 q8 0 10 -6 q-8 -1 -10 4z" fill="#3DA35D"/><path d="M16 24 C9 24 8 14 10 10 C12 16 14 12 16 12 C18 12 20 16 22 10 C24 14 23 24 16 24 Z" fill="${c}"/><path d="M16 24 V12" stroke="rgba(0,0,0,.12)" stroke-width="1"/></g>`,
    sprout:`<g><path d="M16 46 V30" stroke="#52B96E" stroke-width="2.2"/><path d="M16 36 q-8 -1 -10 -8 q9 0 10 5z" fill="#5FC47B"/><path d="M16 33 q8 -1 10 -8 q-9 0 -10 5z" fill="#52B96E"/><circle cx="16" cy="27" r="3.2" fill="${c}"/></g>`,
    seedling:`<g><path d="M16 46 V34" stroke="#7FBF4E" stroke-width="2"/><path d="M16 40 q-6 0 -8 -6 q7 0 8 4z" fill="#8BC34A"/><path d="M16 38 q6 0 8 -6 q-7 0 -8 4z" fill="#9CCB5E"/><circle cx="16" cy="33" r="2.4" fill="${c}"/></g>`,
    wilt:`<g><path d="M16 46 C16 38 14 34 12 30" stroke="#C9A24B" stroke-width="2.2" fill="none"/><path d="M13 36 q-7 2 -10 -3 q7 -3 10 1z" fill="#C9A24B"/><g transform="rotate(28 12 28)">${petals(12,28,5,9,c)}<circle cx="12" cy="28" r="3" fill="#B5781F"/></g></g>`,
    dead:`<g><path d="M16 46 C17 39 13 36 11 33 M16 41 C15 38 19 37 21 35" stroke="#9B7B53" stroke-width="2" fill="none"/><path d="M11 33 l-3 -3 m3 3 l-4 1" stroke="#8a6b45" stroke-width="1.6"/><path d="M21 35 l3 -2" stroke="#8a6b45" stroke-width="1.6"/><circle cx="11" cy="32" r="2.2" fill="${c}"/></g>`,
    empty:`<g><ellipse cx="16" cy="44" rx="7" ry="2.4" fill="rgba(0,0,0,.10)"/><path d="M12 44 q4 -3 8 0" stroke="#6A4527" stroke-width="1.4" fill="none"/></g>`,
  };
  function petals(cx,cy,r,n,col){let s='';for(let i=0;i<n;i++){const a=i/n*Math.PI*2;const x=cx+Math.cos(a)*r,y=cy+Math.sin(a)*r;s+=`<ellipse cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" rx="2.4" ry="4.2" fill="${col}" transform="rotate(${(a*180/Math.PI+90).toFixed(0)} ${x.toFixed(1)} ${y.toFixed(1)})"/>`;}return s;}
  return `<svg class="pl" width="${26*scale}" height="${30*scale}" viewBox="0 0 32 48">${P[ST[status]?ST[status].plant:'empty']||P.empty}</svg>`;
}

/* ---------- themed planter scenes (one motif per advertising channel) ---------- */
function _petals(cx,cy,r,n,col,rx,ry){let s='';for(let i=0;i<n;i++){const a=i/n*Math.PI*2;const x=cx+Math.cos(a)*r,y=cy+Math.sin(a)*r;s+=`<ellipse cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" rx="${rx}" ry="${ry}" fill="${col}" transform="rotate(${(a*180/Math.PI+90).toFixed(0)} ${x.toFixed(1)} ${y.toFixed(1)})"/>`;}return s;}

/* one themed plant in a 64x92 box, standing on the bottom edge.
   state: good | weak (падает) | dead (убыточно) | empty (отключено) */
function themePlant(key,state){
  const G='#3DA35D', GL='#56C078', GD='#2E8C4C';
  let body='';
  if(key==='ozk'){ /* SUNFLOWER */
    if(state==='empty'){ body=`<path d="M32 92 V80" stroke="${GD}" stroke-width="3" stroke-linecap="round"/><path d="M30 82 q-6 -2 -8 -7 q6 -1 8 4z" fill="${GD}"/>`; }
    else if(state==='dead'){ body=`<path d="M32 92 C32 72 27 66 21 62" stroke="#B08A50" stroke-width="3" fill="none" stroke-linecap="round"/><g transform="rotate(36 21 60)"><circle cx="21" cy="60" r="6.5" fill="#7C5A2E"/>${_petals(21,60,11,9,'#C9A24B',2.1,3.6)}</g>`; }
    else { const tilt=state==='weak'?15:0, pc=state==='weak'?'#E8C24A':'#FFC21E';
      body=`<path d="M32 92 V40" stroke="${G}" stroke-width="3.4" stroke-linecap="round"/>

/* a wooden planter box filled with the channel's themed plants (state = campaign health) */
function planterSVG(bed,key){
  const camps=bed.campaigns||[];
  const order={leader:0,excellent:1,good:2,normal:3,new:4,falling:5,unprofitable:6,disabled:7};
  const sorted=[...camps].sort((a,b)=>(order[a.status]-order[b.status])||((b.spend||0)-(a.spend||0)));
  const maxN=key==='media'?3:5;
  const show=sorted.slice(0,maxN);
  const stateOf=s=>(s==='loss')?'dead':'good';
  const W=240,H=176, soilY=118;
  const n=Math.max(show.length,1);
  let plants='';
  const gap=(W-52)/(n+1);
  show.forEach((c,i)=>{
    const st=stateOf(c.status);
    const sc=(c.status==='success')?(key==='media'?1.04:0.98):(key==='media'?0.9:0.83);

    const tx=(x-30*sc).toFixed(1), ty=((soilY+10)-86*sc).toFixed(1);

  return `<svg class="planter-svg" viewBox="0 0 ${W} ${H}">

/* ============================================================
   CHARTS (hand-drawn SVG, no deps)
   ============================================================ */
function lineChart(series,opt){
  opt=opt||{}; const W=opt.w||560,H=opt.h||230,pad={l:46,r:46,t:14,b:26};
  const days=series.map(d=>d.d||d.date);
  const iw=W-pad.l-pad.r, ih=H-pad.t-pad.b;
  // null = data gap → break the line; spend stays continuous
  const sp=series.map(d=>d.spend==null?null:d.spend), rv=series.map(d=>d.rev==null?null:d.rev), dr=series.map(d=>d.drr==null?null:d.drr);
  const fin=a=>a.filter(v=>v!=null&&!isNaN(v));
  const maxL=Math.max(1,...fin(sp),...fin(rv)), maxR=Math.max(1,...fin(dr))*1.15;
  const xx=i=>pad.l+(series.length<2?iw/2:i/(series.length-1)*iw);
  const yL=v=>pad.t+ih-(v/maxL)*ih, yR=v=>pad.t+ih-(v/maxR)*ih;
  const path=(arr,y)=>{let s='',pen=false;arr.forEach((v,i)=>{if(v==null||isNaN(v)){pen=false;return;}s+=(pen?'L':'M')+xx(i).toFixed(1)+' '+y(v).toFixed(1)+' ';pen=true;});return s.trim();};
  let grid='';for(let g=0;g<=4;g++){const y=pad.t+ih-g/4*ih;grid+=`<line x1="${pad.l}" y1="${y}" x2="${W-pad.r}" y2="${y}" stroke="#EEF1F7"/><text x="${pad.l-7}" y="${y+3}" font-size="9" fill="#A0A6B4" text-anchor="end">${kshort(maxL*g/4)}</text><text x="${W-pad.r+7}" y="${y+3}" font-size="9" fill="#A0A6B4">${Math.round(maxR*g/4)}%</text>`;}
  // gap markers (spend present but revenue missing in source)
  let gaps='';series.forEach((d,i)=>{if(d.gap)gaps+=`<line x1="${xx(i).toFixed(1)}" y1="${pad.t}" x2="${xx(i).toFixed(1)}" y2="${pad.t+ih}" stroke="#E0A93B" stroke-width="1" stroke-dasharray="3 3" opacity="0.6"/>`;});
  // restored points: filled silently from daily reports (no visual marker)
  let fmarks='';
  let xl='';const step=Math.ceil(series.length/7);series.forEach((d,i)=>{if(i%step===0||i===series.length-1)xl+=`<text x="${xx(i)}" y="${H-8}" font-size="9" fill="#A0A6B4" text-anchor="middle">${d.d||(d.date||'').slice(5)}</text>`;});
  const dots=(arr,y,col)=>arr.map((v,i)=>(v==null||isNaN(v))?'':`<circle cx="${xx(i)}" cy="${y(v)}" r="${series.length>20?0:2.6}" fill="#fff" stroke="${col}" stroke-width="1.6"/>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">${grid}${gaps}
    <path d="${path(sp,yL)}" fill="none" stroke="#005BFF" stroke-width="2.2"/>
    <path d="${path(rv,yL)}" fill="none" stroke="#22B473" stroke-width="2.2"/>
    <path d="${path(dr,yR)}" fill="none" stroke="#8E5BFF" stroke-width="2.2"/>
    ${dots(sp,yL,'#005BFF')}${dots(rv,yL,'#22B473')}${dots(dr,yR,'#8E5BFF')}${fmarks}${xl}</svg>`;
}
function lineLegend(){return `<div style="margin-bottom:6px"><span class="lg-line"><i style="background:#005BFF"></i>Расходы ₽</span><span class="lg-line"><i style="background:#22B473"></i>Выручка ₽</span><span class="lg-line"><i style="background:#8E5BFF"></i>ДРР %</span></div>`;}
function donut(dist){
  const ents=ST_ORDER.filter(k=>dist[k]).map(k=>[k,dist[k]]);
  const total=ents.reduce((s,[,n])=>s+n,0)||1;
  let a=-Math.PI/2,seg='';const R=46,cx=58,cy=58,sw=16;
  ents.forEach(([k,n])=>{const frac=n/total,a2=a+frac*Math.PI*2;const x1=cx+Math.cos(a)*R,y1=cy+Math.sin(a)*R,x2=cx+Math.cos(a2)*R,y2=cy+Math.sin(a2)*R;const large=frac>.5?1:0;seg+=`<path d="M${x1.toFixed(1)} ${y1.toFixed(1)} A${R} ${R} 0 ${large} 1 ${x2.toFixed(1)} ${y2.toFixed(1)}" fill="none" stroke="${ST[k].color}" stroke-width="${sw}"/>`;a=a2;});
  return `<svg viewBox="0 0 116 116" width="116" height="116">${seg}<text x="58" y="54" font-size="20" font-weight="800" text-anchor="middle" fill="#10182B">${total}</text><text x="58" y="70" font-size="9.5" text-anchor="middle" fill="#A0A6B4">кампаний</text></svg>`;
}
function sparkline(arr,col){
  if(!arr||arr.length<2)return '<span style="color:#C5CAD6">—</span>';
  const W=64,H=22,mx=Math.max(...arr),mn=Math.min(...arr),rg=mx-mn||1;
  const pts=arr.map((v,i)=>`${(i/(arr.length-1)*W).toFixed(1)},${(H-2-((v-mn)/rg)*(H-4)).toFixed(1)}`).join(' ');
  const trend=arr[arr.length-1]>=arr[0];
  return `<svg class="spark" width="${W}" height="${H}"><polyline points="${pts}" fill="none" stroke="${col||(trend?'#22B473':'#E5484D')}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

const DB={
  KEY:'ozon_garden_snapshots_v1',
  load(){try{const r=localStorage.getItem(this.KEY);const v=r?JSON.parse(r):[];return Array.isArray(v)?v:[];}catch(e){return[];}},
  save(list){try{localStorage.setItem(this.KEY,JSON.stringify(list));}catch(e){toast('Не удалось сохранить (хранилище браузера недоступно)',true);}},
  all(){ // baseline + uploaded, sorted by date asc
    const up=this.load();
    const base=Object.assign({},BASELINE,{baseline:true});
    const merged=[base,...up];
    return merged.sort((a,b)=>dnum(a.report_date)-dnum(b.report_date));
  },
  add(snap){const up=this.load();const i=up.findIndex(s=>s.report_date===snap.report_date);if(i>=0)up[i]=snap;else up.push(snap);this.save(up);},
  remove(date){this.save(this.load().filter(s=>s.report_date!==date));},
  clear(){this.save([]);}
};
function dnum(d){const m=(d||'').match(/(\d{2})\.(\d{2})\.?(\d{4})?/);if(!m)return 0;return (+(m[3]||2026))*1e4+(+m[2])*1e2+(+m[1]);}

/* ---- статусы кампаний (3 + архив) ---- */
/* отключённая/выключенная РК (по исходному статусу любого инструмента) */
function isOff(c){
  const s=(c._src!=null?c._src:'').toString().toLowerCase();
  return /откл|выключ|останов|на паузе|пауза|архив|disabled|paused|stopped|inactive/.test(s);
}
function statusOf(c,key){
  const sp=+c.spend||0, od=+c.orders||0, rv=+c.rev||0;
  // АРХИВ: отключённые РК с любого из 4 инструментов (VK, ОЗК, ОЗЗ+Морковск, Медийная),
  //        а также неоткручиваемые (нет расхода и нет заказов). Для VK CPA нулевой расход
  //        при статусе "Активно" — норма, в архив не уводим.
  if(isOff(c)) return 'archived';
  if(key!=='vk' && sp<1 && od<1) return 'archived';
  if(TRK_RULES.active()) return statusByRules(c);
  if(sp>0 && (rv<=0||od<1)) return 'loss';      // расход без заказов
  const d=c.drr;
  if(d==null||d<=0) return 'stable';
  const t=BedTargets.get(key);
  if(d>t.hi) return 'loss';
  if(d<=t.ok) return 'success';
  return 'stable';
}
/* пересчитывает каждый снимок: статусы, активные/архив, агрегаты грядок (без архива) */
function prepBeds(snap){
  if(!snap||!snap.beds)return;
  snap._archive=[];
  Object.keys(snap.beds).forEach(key=>{
    const b=snap.beds[key];
    const all=b._all||(b._all=b.campaigns||[]);
    all.forEach(c=>{if(c._src===undefined)c._src=(c.src_status!=null?c.src_status:(c.raw_status!=null?c.raw_status:c.status));c.status=statusOf(c,key);});
    const active=all.filter(c=>c.status!=='archived');
    all.filter(c=>c.status==='archived').forEach(c=>snap._archive.push(Object.assign({_bed:key,_bedTitle:b.title},c)));
    b.campaigns=active;
    b.count=active.length;
    b.spend=active.reduce((s,c)=>s+(+c.spend||0),0);
    b.rev=active.reduce((s,c)=>s+(+c.rev||0),0);
    b.orders=active.reduce((s,c)=>s+(+c.orders||0),0);
    b.drr=b.rev>0?+(b.spend/b.rev*100).toFixed(1):0;
    const dist={};active.forEach(c=>dist[c.status]=(dist[c.status]||0)+1);b.status_dist=dist;
  });
  let sp=0,rv=0,od=0;Object.values(snap.beds).forEach(b=>{sp+=b.spend;rv+=b.rev;od+=b.orders;});
  snap.overall={spend:sp,rev:rv,drr:rv>0?+(sp/rv*100).toFixed(1):0,orders:od};
}

const CM={

};
function cid(c){return c.id??c.name;}

/* расшифровка статусов (использует текущие пороги ДРР) */
function statusDef(k){
  const lo=DRR_OK_LOW, hi=DRR_OK_HIGH;
  if(k==='success')return {t:`✅ Успешная — ДРР ${lo}–${hi}%`,
    b:`Целевая зона ДРР. Реклама окупается с нужной маржинальностью — это эталон, к которому подтягиваем остальные кампании.<br><br><b>Что делаем:</b> держим и осторожно масштабируем бюджет/ставку (+10–20%), следим, чтобы ДРР не ушёл выше ${hi}%.`};
  if(k==='stable')return {t:`📊 Стабильная — ДРР меньше ${lo}%`,
    b:`Реклама работает эффективно: расход относительно выручки низкий, есть запас для роста.<br><br>Сюда же относятся VK-кампании по модели CPA без открутки — нулевой расход означает отсутствие риска.<br><br><b>Что делаем:</b> можно наращивать бюджет/ставку и расширять охват, пока ДРР держится в комфортной зоне.`};
  if(k==='loss')return {t:`⚠️ Убыточная — ДРР больше ${hi}%`,
    b:`Реклама не окупается: расход слишком велик относительно выручки. Сюда же попадают РК с расходом без заказов.<br><br><b>Что делаем:</b> снизить ставку на 15–30%, отминусовать нерелевантные запросы, проверить цену и карточку. Без улучшения — пауза или пересборка кампании.`};
  return {t:ST[k]?ST[k].label:k,b:''};
}
function showModal(title,bodyHTML,wide){
  const ov=el('div','modal-ov');
  ov.innerHTML=`<div class="modal${wide?' modal-wide':''}"><div class="modal-h"><span>${title}</span><button class="modal-x" aria-label="Закрыть">✕</button></div><div class="modal-b">${bodyHTML}</div></div>`;
  ov.addEventListener('click',e=>{if(e.target===ov||e.target.classList.contains('modal-x'))ov.remove();});
  document.addEventListener('keydown',function esc(e){if(e.key==='Escape'){ov.remove();document.removeEventListener('keydown',esc);}});
  document.body.appendChild(ov);
  return ov;
}

let STATE={snap:null,view:'tracker',bed:null,camp:null,chartRange:30,week:null,retroSlide:0};
function curList(){return DB.all();}
function setCurrentToLatest(){const l=curList();STATE.snap=l[l.length-1];prepBeds(STATE.snap);}
function prevSnap(){const l=curList();const i=l.findIndex(s=>s.report_date===STATE.snap.report_date);const p=i>0?l[i-1]:null;if(p)prepBeds(p);return p;}

   ============================================================ */
function deltaTag(cur,prev,invert){
  if(prev==null||cur==null||prev===0)return '';
  const d=(cur-prev)/Math.abs(prev)*100; const good=invert?d<0:d>0;
  return `<span class="delta ${good?'up':'down'}">${d>0?'▲':'▼'} ${Math.abs(Math.round(d*10)/10)}%</span>`;
}
function bedDeltaDRR(key){
  const p=prevSnap(); if(!p||!p.beds[key])return '';
  return deltaTag(STATE.snap.beds[key].drr,p.beds[key].drr,true);
}

/* правила: { metricKey: {a:Успешная-граница, b:Плохая-граница} } */
const TRK_RULES={
  KEY:'tracker_rules_v1',
  load(){try{return JSON.parse(localStorage.getItem(this.KEY))||{};}catch(e){return{};}},
  save(o){try{localStorage.setItem(this.KEY,JSON.stringify(o));}catch(e){toast('Не сохранилось',true);}},
  set(k,a,b){const o=this.load();if(a==null&&b==null)delete o[k];else o[k]={a:a,b:b};this.save(o);},
  activeKeys(){const o=this.load();return Object.keys(o).filter(k=>o[k]&&(o[k].a!=null||o[k].b!=null));},
  active(){return this.activeKeys().length>0;}
};
const ST_RANK={success:0,stable:1,loss:2};
function worseStatus(a,b){return ST_RANK[b]>ST_RANK[a]?b:a;}
function bandByMetric(m,v,a,b){
  if(v==null||isNaN(v))return null;
  if(a==null||b==null)return null;
  if(m.hi){ if(v>=a)return 'success'; if(v<=b)return 'loss'; return 'stable'; }
  else { if(v<=a)return 'success'; if(v>=b)return 'loss'; return 'stable'; }
}
function statusByRules(c){
  const rules=TRK_RULES.load();const keys=TRK_RULES.activeKeys();
  let worst='success',matched=false;
  for(const k of keys){
    const m=TRK_METRICS.find(x=>x.k===k);if(!m||m.nodata)continue;
    const band=bandByMetric(m,m.get(c),rules[k].a,rules[k].b);
    if(band){worst=worseStatus(worst,band);matched=true;}
  }
  return matched?worst:'stable';
}

const ArchiveStore={
  KEY:'tracker_weekly_archive_v1',
  load(){try{return JSON.parse(localStorage.getItem(this.KEY))||{weeks:{}};}catch(e){return {weeks:{}};}},
  save(o){try{localStorage.setItem(this.KEY,JSON.stringify(o));}catch(e){}},
  put(rec){const o=this.load();o.weeks=o.weeks||{};o.weeks[rec.week]=rec;this.save(o);},
  has(week){return !!(this.load().weeks||{})[week];},
  list(){const w=this.load().weeks||{};return Object.values(w).sort((a,b)=>(a.ts||0)-(b.ts||0));},
  reset(){this.save({weeks:{}});}
};
function snapWeekRecord(useprev){
  const s=STATE.snap,all=trkAll();
  const dist={success:0,stable:0,loss:0,idle:0},statuses={},meta={};let spend=0,rev=0;
  all.forEach(c=>{
    let st,drr;
    if(useprev){if(!c.prev)return;const cl=Object.assign({},c,{spend:c.prev.spend,rev:c.prev.rev,drr:c.prev.drr,orders:c.prev.orders});
      st=((+c.prev.spend||0)<1)?'idle':statusOf(cl,c._bed);drr=+c.prev.drr||0;spend+=(+c.prev.spend||0);rev+=(+c.prev.rev||0);}
    else{st=((+c.spend||0)<1)?'idle':c.status;drr=+c.drr||0;spend+=(+c.spend||0);rev+=(+c.rev||0);}
    if(dist[st]!=null)dist[st]++;statuses[cid(c)]=st;
    meta[cid(c)]=[String(c.name||'').slice(0,48),(typeof c.id==='number'?c.id:''),c._bed,Math.round(drr)];
  });
  return {week:useprev?s.weekPrev:s.weekCur,date:useprev?'':s.report_date,dist,overall:{spend:Math.round(spend),rev:Math.round(rev),drr:rev?+(spend/rev*100).toFixed(1):0},statuses,meta};
}
function archiveAutosave(){
  const s=STATE.snap;if(!s||!s.weekCur)return;
  const cur=snapWeekRecord(false);cur.ts=Date.now();ArchiveStore.put(cur);
  if(s.weekPrev){const ex=(ArchiveStore.load().weeks||{})[s.weekPrev];
    if(!ex||!ex.meta){const prev=snapWeekRecord(true);if(Object.keys(prev.statuses).length){prev.ts=Date.now()-7*86400000;ArchiveStore.put(prev);}}}
}
function archStC(k){return k==='idle'?'#9AA3B0':(ST[k]?ST[k].color:'#9AA3B0');}
function archStName(k){return k==='idle'?'Без расхода':(k==='loss'?'Плохая':(ST[k]?ST[k].label:k));}
function archTransModal(pw,cw){
  const a=pw.statuses||{},b=cw.statuses||{},am=pw.meta||{},bm=cw.meta||{};
  const cur=trkAll(),curMap={};cur.forEach(c=>curMap[cid(c)]=c);
  const info=(id,side)=>{const mm=(side==='b'?bm:am)[id];if(mm)return {n:mm[0],id:mm[1],bed:mm[2],drr:mm[3]};const c=curMap[id];return c?{n:c.name,id:(typeof c.id==='number'?c.id:''),bed:c._bed,drr:Math.round(+c.drr||0)}:{n:id,id:'',bed:'',drr:''};};
  const rk={success:0,stable:1,loss:2,idle:3},bk={improved:[],worsened:[],paused:[],launched:[],new:[]};
  Object.keys(b).forEach(id=>{const to=b[id],from=a[id];
    if(from==null){if(to!=='idle')bk.new.push(id);return;}
    if(from===to)return;
    if(to==='idle'){bk.paused.push(id);return;}
    if(from==='idle'){bk.launched.push(id);return;}
    if(rk[to]<rk[from])bk.improved.push(id);else bk.worsened.push(id);});
  const row=id=>{const pI=info(id,'a'),cI=info(id,'b'),bed=cI.bed||pI.bed;
    return `<tr><td>${TOOL_META[bed]?`<span class="tool-chip" style="--c:${TOOL_META[bed][1]}">${TOOL_META[bed][0]}</span>`:''}</td>

      <td><span class="badge-st" style="background:${archStC(a[id])}1a;color:${archStC(a[id])}">${archStName(a[id])}</span> → <span class="badge-st" style="background:${archStC(b[id])}1a;color:${archStC(b[id])}">${archStName(b[id])}</span></td>
      <td class="r">${pI.drr}% → ${cI.drr}%</td></tr>`;};
  const sec=(title,ids,color)=>ids.length?`<div class="arch-sec-h" style="color:${color}">${title} (${ids.length})</div><div class="st-tablewrap" style="margin-bottom:14px"><table class="st-table"><tbody>${ids.sort((x,y)=>info(y,'b').drr-info(x,'b').drr).map(row).join('')}</tbody></table></div>`:'';
  const seeded=!pw.date,totalCh=bk.improved.length+bk.worsened.length+bk.paused.length+bk.launched.length+(seeded?0:bk.new.length);
  showModal(`Переходы статусов: ${pw.week} → ${cw.week}`,`<div class="art-modal">
    ${sec('▲ Улучшили статус',bk.improved,'#16A34A')}${sec('▼ Ухудшили статус',bk.worsened,'#E5484D')}
    ${sec('⏸ Остановлены (ушли в «Без расхода»)',bk.paused,'#9AA3B0')}${sec('▶ Запущены (из «Без расхода»)',bk.launched,'#2D7CFF')}
    ${seeded?'':sec('🆕 Новые РК',bk.new,'#7C5CFF')}
    ${totalCh?'':'<div style="padding:20px;text-align:center;color:#9AA3B0">Изменений статусов между неделями нет</div>'}
    ${seeded?'<div class="arch-note" style="margin-top:6px">Прошлая неделя восстановлена из сравнения, поэтому новые РК и VK здесь не показаны.</div>':''}</div>`);
}

  const weeks=ArchiveStore.list();if(!weeks.length)return '';
  const bar=(w,i)=>{const tot=w.dist.success+w.dist.stable+w.dist.loss+w.dist.idle||1;
    const seg=(n,c,label)=>n?`<span style="width:${(n/tot*100).toFixed(2)}%;background:${c}" title="${label}: ${n}"></span>`:'';
    return `<div class="arch-row ${i>0?'arch-row-click':''}" data-i="${i}">${i>0?'<span class="arch-go" title="Показать, какие РК сменили статус">🔍</span>':'<span class="arch-go" style="opacity:0">·</span>'}<div class="arch-wk">${w.week}${w.date?'':' <span class="arch-seed">восст.</span>'}</div>
      <div class="arch-bar">${seg(w.dist.success,ST.success.color,'Успешная')}${seg(w.dist.stable,ST.stable.color,'Стабильная')}${seg(w.dist.loss,ST.loss.color,'Плохая')}${seg(w.dist.idle,'#C6CDD8','Без расхода')}</div>
      <div class="arch-drr">ДРР ${w.overall.drr}% · <span style="color:var(--muted)">${w.dist.success}/${w.dist.stable}/${w.dist.loss}</span></div></div>`;};
  let trans='';
  if(weeks.length>=2){const pw=weeks[weeks.length-2],cw=weeks[weeks.length-1],a=pw.statuses||{},b=cw.statuses||{};
    const rk={success:0,stable:1,loss:2,idle:3};let imp=0,wor=0,nw=0;
    Object.keys(b).forEach(id=>{const to=b[id],from=a[id];if(from==null){if(to!=='idle')nw++;return;}if(from===to||to==='idle'||from==='idle')return;if(rk[to]<rk[from])imp++;else wor++;});
    const seeded=!pw.date;
    trans=`<div class="arch-trans arch-trans-click">Переходы статусов ${pw.week} → ${cw.week}: <b style="color:#16A34A">▲ улучшили ${imp}</b> · <b style="color:#E5484D">▼ ухудшили ${wor}</b>${seeded?` <span style="color:var(--muted)">(по кампаниям, у которых есть данные за обе недели; новые РК и VK не учтены — прошлая неделя восстановлена)</span>`:` · <b style="color:#7C5CFF">🆕 новых ${nw}</b>`} <span class="arch-trans-go">— подробнее →</span></div>`;}
  return `<div class="trk-bh"><span class="trk-bn" style="--c:#2D7CFF">📆</span>История по неделям (архив) <span class="trk-bhs">снимок сохраняется при каждой загрузке недели и копится со временем</span></div>

}

function attentionData(){
  const all=trkAll(),sm=stockMap();
  const acted=all.filter(c=>TRK.get(cid(c)));
  const noDate=acted.filter(c=>{const t=TRK.get(cid(c));return t.action==='restart'&&!t.restartDate;});
  const artOf=c=>{const a=campArt(c);return a?sm[a.toLowerCase()]:null;};
  const oosAds=all.filter(c=>{const it=artOf(c);return it&&it.st===0&&(+c.spend||0)>0;});
  const lowStock=all.filter(c=>{const it=artOf(c);return it&&it.st>0&&it.dc!=null&&it.dc<StockCfg.get()&&(+c.spend||0)>0;});
  const drrSpike=all.filter(c=>c.prev&&((+c.drr||0)-(+c.prev.drr||0))>15&&(+c.spend||0)>0);
  const worsened=all.filter(c=>{if(!c.prev)return false;const pd=+c.prev.drr||0,cd=+c.drr||0;return pd>0&&pd<=30&&cd>30&&(+c.spend||0)>0;});
  return {noDate,oosAds,lowStock,drrSpike,worsened};
}
function attnModal(title,list,kind){

    if(kind==='drr')return `ДРР ${pct(c.drr)} <span style="color:#E5484D">(${c.prev?'+'+((+c.drr||0)-(+c.prev.drr||0)).toFixed(1)+' пп':''})</span>`;
    if(kind==='stock')return it?`остаток ${fmt(it.st)}${it.dc!=null?' · '+it.dc+'дн':''}`:'—';
    if(kind==='date'){const t=TRK.get(cid(c))||{};return `<span style="color:#E5484D">дата перезапуска не указана</span>`;}

}

function wowSummary(){
  const all=trkAll().filter(c=>['ozk','ozz','media'].includes(c._bed)&&c.prev);
  let cs=0,cr=0,co=0,ps=0,pr=0,po=0;
  all.forEach(c=>{cs+=(+c.spend||0);cr+=(+c.rev||0);co+=(+c.orders||0);ps+=(+c.prev.spend||0);pr+=(+c.prev.rev||0);po+=(+c.prev.orders||0);});
  const cd=cr?cs/cr*100:0,pd=pr?ps/pr*100:0,pc=(a,b)=>b?((a-b)/b*100):(a>0?100:0);
  return {cs,cr,co,cd,dSpend:pc(cs,ps),dRev:pc(cr,pr),dOrders:pc(co,po),dDrr:cd-pd};
}
function topMovers(){
  const all=trkAll().filter(c=>['ozk','ozz','media'].includes(c._bed)&&c.prev&&(+c.spend||0)>0);
  const m=all.map(c=>({c,dRev:(+c.rev||0)-(+c.prev.rev||0),dDrr:(+c.drr||0)-(+c.prev.drr||0)}));
  return {
    gain:m.filter(x=>x.dRev>0).sort((a,b)=>b.dRev-a.dRev).slice(0,6),
    drop:m.filter(x=>x.dRev<0).sort((a,b)=>a.dRev-b.dRev).slice(0,6),
    drr:m.filter(x=>x.dDrr>1&&(+x.c.spend||0)>1000).sort((a,b)=>b.dDrr-a.dDrr).slice(0,6)
  };
}
function moverRow(x,kind){
  const c=x.c,tm=TOOL_META[c._bed];
  const val=kind==='drr'?`<b style="color:#E5484D">+${x.dDrr.toFixed(1)} пп</b> <span class="mv-sub">${pct(c.prev.drr)}→${pct(c.drr)}</span>`
    :`<b style="color:${x.dRev>=0?'#16A34A':'#E5484D'}">${x.dRev>=0?'+':'−'}${money(Math.abs(x.dRev))}</b>`;
  return `<div class="mv-row" data-bed="${c._bed}" data-id="${esc(String(c.id||c.name))}">
    <div class="mv-name">${tm?`<span class="tool-dot" style="background:${tm[1]}" title="${tm[0]}"></span>`:''}${esc(c.name)}</div>
    <div class="mv-val">${val}</div></div>`;
}

function wireTrkWork(root){

  });

function trkRulesHTML(){
  const rules=TRK_RULES.load();
  const rows=TRK_METRICS.map(m=>{
    const r=rules[m.k]||{};
    const aLbl=m.hi?'Успешная: значение ≥':'Успешная: значение ≤';
    const bLbl=m.hi?'Плохая: значение ≤':'Плохая: значение ≥';
    return `<div class="rule-row ${m.nodata?'nodata':''}" data-k="${m.k}">
      <div class="rule-m">${m.label}${m.nodata?' <span class="rule-nd">нет в данных</span>':''}</div>
      <div class="rule-in"><label>${aLbl}</label><input type="number" step="any" class="rule-a" data-k="${m.k}" value="${r.a!=null?r.a:''}" placeholder="—"></div>
      <div class="rule-in"><label>Стабильная</label><span class="rule-mid">между границами</span></div>
      <div class="rule-in"><label>${bLbl}</label><input type="number" step="any" class="rule-b" data-k="${m.k}" value="${r.b!=null?r.b:''}" placeholder="—"></div>
    </div>`;
  }).join('');
  return `<div class="card card-pad rules-card">
    <div class="card-title">Правила статусов (СБТ)</div>
    <div class="rules-note">По каждому критерию задаются <b>две границы</b> — они сразу определяют все три статуса (нельзя задать только для одного). Метрика имеет направление: для ДРР «меньше = лучше», для остальных «больше = лучше». Несколько критериев комбинируются по правилу <b>«худший побеждает»</b>. Оставьте поля пустыми, чтобы не использовать критерий. Если ничего не задано — статусы считаются по ДРР по умолчанию.</div>
    <div class="rules-head"><span>Критерий</span><span>Успешная</span><span>Стабильная</span><span>Плохая</span></div>
    ${rows}
    <div class="rules-err" id="rulesErr"></div>
    <div class="rules-actions"><button class="btn-primary" id="rulesSave">Сохранить правила</button><button class="btn-ghost" id="rulesReset">Сбросить</button></div>
  </div>`;
}
function wireTrkRules(root){
  const errBox=root.querySelector('#rulesErr');
  const validate=()=>{
    const errs=[];
    TRK_METRICS.forEach(m=>{
      const a=root.querySelector(`.rule-a[data-k="${m.k}"]`),b=root.querySelector(`.rule-b[data-k="${m.k}"]`);
      const av=a.value.trim(),bv=b.value.trim();
      if(av!==''||bv!==''){
        if(av===''||bv==='')errs.push(`${m.label}: нужно задать обе границы (для всех трёх статусов).`);
        else{const an=+av,bn=+bv;
          if(m.hi&&an<=bn)errs.push(`${m.label}: граница Успешной (≥${an}) должна быть выше границы Плохой (≤${bn}).`);
          if(!m.hi&&an>=bn)errs.push(`${m.label}: граница Успешной (≤${an}) должна быть ниже границы Плохой (≥${bn}).`);
        }
      }
    });
    errBox.innerHTML=errs.length?errs.map(e=>`⚠️ ${e}`).join('<br>'):'';
    return errs;
  };
  root.querySelectorAll('.rule-a,.rule-b').forEach(i=>i.oninput=validate);
  root.querySelector('#rulesSave').onclick=()=>{
    const errs=validate();if(errs.length){toast('Исправьте ошибки в правилах',true);return;}
    const o={};TRK_METRICS.forEach(m=>{const a=root.querySelector(`.rule-a[data-k="${m.k}"]`).value.trim(),b=root.querySelector(`.rule-b[data-k="${m.k}"]`).value.trim();if(a!==''&&b!=='')o[m.k]={a:+a,b:+b};});
    TRK_RULES.save(o);if(STATE.snap)prepBeds(STATE.snap);toast('Правила сохранены, статусы пересчитаны');render();
  };
  root.querySelector('#rulesReset').onclick=()=>{TRK_RULES.save({});if(STATE.snap)prepBeds(STATE.snap);toast('Правила сброшены');render();};
}

/* объединённая подневка по всем инструментам */
function combinedDaily(s){
  const ozk=(s.beds.ozk&&s.beds.ozk.daily)||[];
  if(!ozk.length)return [];
  const dates=ozk.map(d=>d.d);
  // медийка: месячные итоги -> равномерно по дням месяца (подневки нет)
  let mSpM=0,mSpJ=0,mRvM=0,mRvJ=0;
  ((s.beds.media&&(s.beds.media._all||s.beds.media.campaigns))||[]).forEach(c=>{
    const spM=+c.spend_may||0,spJ=+c.spend_jun||0,dM=+c.drr_may||0,dJ=+c.drr_jun||0;
    mSpM+=spM;mSpJ+=spJ;if(dM>0)mRvM+=spM/dM*100;if(dJ>0)mRvJ+=spJ/dJ*100;
  });
  const nMay=dates.filter(d=>d.endsWith('.05')).length||1, nJun=dates.filter(d=>d.endsWith('.06')).length||1;
  // ОЗЗ подневка
  const ozzM={};((s.beds.ozz&&s.beds.ozz.daily)||[]).forEach(d=>{ozzM[d.d]={spend:d.spend||0,rev:d.rev||0};});
  // VK подневка (YYYY-MM-DD -> DD.MM)
  const vkM={};((s.beds.vk&&s.beds.vk.vk_daily)||[]).forEach(d=>{const m=(d.date||'').match(/\d{4}-(\d{2})-(\d{2})/);if(m)vkM[m[2]+'.'+m[1]]={spend:d.spend||0,rev:d.rev||0};});
  return ozk.map(d=>{
    const may=d.d.endsWith('.05');
    let sp=(d.spend||0), rv=(d.rev||0);
    sp+= may?mSpM/nMay:mSpJ/nJun; rv+= may?mRvM/nMay:mRvJ/nJun;
    if(ozzM[d.d]){sp+=ozzM[d.d].spend;rv+=ozzM[d.d].rev;}
    if(vkM[d.d]){sp+=vkM[d.d].spend;rv+=vkM[d.d].rev;}
    return {d:d.d,spend:Math.round(sp),rev:Math.round(rv),drr:rv>0?+(sp/rv*100).toFixed(1):null};
  });
}

function plural(n,a,b,c){n=Math.abs(n)%100;const n1=n%10;if(n>10&&n<20)return c;if(n1>1&&n1<5)return b;if(n1===1)return a;return c;}

function allRecs(s){
  const out=[];
  Object.keys(s.beds).forEach(k=>{const b=s.beds[k];(b.campaigns||[]).forEach(c=>{
    let kind=null,tag=null;
    if(c.status==='loss'){kind='crit';tag='Срочно';}

    if(kind)out.push({kind,tag,bed:k,camp:c,name:c.name,drr:c.drr,rec:c.rec||c.comment||CM.get(cid(c))||''});
  });});
  const pr={crit:0,opt:1,scale:2};

}

  if(c.drr==null)return '';
  const avg=b.drr; const better=c.drr<avg; const diff=avg?Math.abs(Math.round((c.drr-avg)/avg*100)):0;
  return `<div class="card-title" style="margin-top:6px">Сравнение с инструментом</div>
    <div class="cmp-stats">
      <div class="cs"><div class="v" style="color:${drrColor(c.drr)}">${pct(c.drr)}</div><div class="l">ДРР кампании</div></div>
      <div class="cs"><div class="v">${pct(avg)}</div><div class="l">Средний по инструменту</div></div>
      <div class="cs"><div class="v" style="color:${better?'#22B473':'#E5484D'}">${better?'−':'+'}${diff}%</div><div class="l">${better?'лучше среднего':'хуже среднего'}</div></div>
    </div>`;
}
function eventHistory(c,k){
  // derive plausible events from data
  const ev=[];
  if(c.trend==='старт в июне')ev.push(['Запуск кампании','старт открутки в июне']);
  else ev.push(['Кампания активна','открутка по инструменту идёт']);
  if(c.trend==='рост расхода')ev.push(['Рост расхода','бюджет наращивается день ко дню']);
  if(c.trend==='снижение расхода')ev.push(['Снижение расхода','открутка сокращается']);
  if(c.drr!=null){
    if(c.drr>DRR_OK_HIGH)ev.push(['Высокий ДРР','реклама убыточна ('+pct(c.drr)+')']);
    else if(c.drr>=DRR_OK_LOW)ev.push(['ДРР в целевой зоне','успешная окупаемость ('+pct(c.drr)+')']);
    else ev.push(['ДРР ниже 25%','эффективно, есть запас для роста ('+pct(c.drr)+')']);
  }
  ev.push(['Текущий статус: '+ST[c.status].label, c.rec?trim(c.rec,70):'мониторим']);
  return '<div class="timeline">'+ev.map(([t,d])=>`<div class="tl-item"><div class="tl-dot">${I.up}</div><div><div class="tl-t">${esc(t)}</div><div class="tl-d">${esc(d)}</div></div></div>`).join('')+'</div>';
}
