/* ============================================================
   XLSX PARSER — turns an uploaded daily report into a snapshot
   ============================================================ */
function handleFile(file){
  toast('Читаю '+file.name+'…');
  const fr=new FileReader();
  fr.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const snap=buildSnapshot(wb);
      DB.add(snap); STATE.snap=snap; prepBeds(snap);
      go('garden'); toast('Отчёт за '+snap.report_date+' добавлен в трекер ✅');
    }catch(err){console.error(err);toast('Не удалось разобрать файл: '+err.message,true);}
  };
  fr.onerror=()=>toast('Ошибка чтения файла',true);
  fr.readAsArrayBuffer(file);
}
function sheetRows(wb,name){const ws=wb.Sheets[name];return ws?XLSX.utils.sheet_to_json(ws,{header:1,defval:null,raw:true}):null;}
function findHeader(rows,must){for(let i=0;i<Math.min(rows.length,6);i++){const r=(rows[i]||[]).map(x=>String(x||'').trim());if(must.every(m=>r.includes(m)))return i;}return -1;}
function colmap(headerRow){const m={};headerRow.forEach((h,i)=>{m[String(h||'').trim()]=i;});return m;}
function num(v){if(v==null||v==='')return null;const n=typeof v==='number'?v:parseFloat(String(v).replace(/\s/g,'').replace(',','.'));return isNaN(n)?null:n;}

function mapStatusJS(ocenka,isTop,isNew){
  if(isTop)return 'leader'; if(isNew)return 'new';
  const o=String(ocenka||'');
  if(o==='Отлично')return 'excellent'; if(o==='Хорошо')return 'good'; if(o==='Норма')return 'normal';
  if(o==='Высокий ДРР')return 'falling'; if(o==='Критичный ДРР'||o==='Расход без заказов')return 'unprofitable';
  if(o==='Нет расхода')return 'disabled'; return 'normal';
}
function ozzStatusJS(comment){const c=String(comment||'').toLowerCase();
  if(c.includes('критичный')||c.includes('убыточн'))return 'unprofitable';
  if(c.includes('высокий'))return 'falling';
  if(c.includes('без рекламных заказов')||c.includes('расход без'))return 'unprofitable';
  if(c.includes('окупаемость в норме'))return 'normal';
  if(c.includes('нет открутки'))return 'disabled'; return 'normal';}

function dailyFromSheet(wb,name){
  const rows=sheetRows(wb,name); if(!rows)return null;
  const hr=findHeader(rows,['SKU']); if(hr<0)return null;
  const hdr=rows[hr].map(x=>String(x||'').trim());
  const idx={};hdr.forEach((h,i)=>{
    let m=h.match(/^Расход, ₽ (\d{2}\.\d{2})$/);if(m){(idx.sp=idx.sp||{})[m[1]]=i;}
    m=h.match(/^Заказано на сумму.*?(\d{2}\.\d{2})$/);if(m&&!h.includes('Δ')&&!h.includes('%')){(idx.rv=idx.rv||{})[m[1]]=i;}
  });
  if(!idx.sp)return null;
  const dates=Object.keys(idx.sp);
  const data=rows.slice(hr+1).filter(r=>r&&r[0]&&!String(r[0]).startsWith('ВСЕГО'));
  return dates.map(d=>{let s=0,r=0;data.forEach(row=>{s+=num(row[idx.sp[d]])||0;if(idx.rv&&idx.rv[d]!=null)r+=num(row[idx.rv[d]])||0;});return {d,spend:Math.round(s),rev:Math.round(r),drr:r?Math.round(s/r*1000)/10:0};});
}
function reportDateFromSheet(wb){
  for(const nm of ['ОЗЗ + Морковск','ОЗК']){const rows=sheetRows(wb,nm);if(!rows)continue;const hr=findHeader(rows,['SKU']);if(hr<0)continue;
    const ds=rows[hr].map(x=>String(x||'')).filter(h=>/^Расход, ₽ \d{2}\.\d{2}$/.test(h)).map(h=>h.slice(-5));
    if(ds.length){const last=ds[ds.length-1];return last+'.2026';}}
  return new Date().toLocaleDateString('ru-RU');
}

function buildSnapshot(wb){
  const report_date=reportDateFromSheet(wb);
  const beds={};
  // ---- ОЗК from "Анализ кампаний" (Оплата за клик) ----
  let ak=sheetRows(wb,'Анализ кампаний');
  let ozkC=[];
  if(ak){const hr=findHeader(ak,['ID кампании','Инструмент']);if(hr>=0){const M=colmap(ak[hr]);
    ak.slice(hr+1).forEach(r=>{if(!r||r[M['ID кампании']]==null)return;
      const tool=String(r[M['Инструмент']]||'');
      const c={id:num(r[M['ID кампании']]),name:r[M['Товар (осн.)']],product:r[M['Товар (осн.)']],
        spend:num(r[M['Расход ₽']]),rev:num(r[M['Продажи в продв. ₽']]),drr:num(r[M['ДРР %']]),
        cpc:num(r[M['CPC ₽']]),ctr:num(r[M['CTR %']]),shows:num(r[M['Показы']]),clicks:num(r[M['Клики']]),
        cart:num(r[M['В корзину']]),cartconv:num(r[M['Конв.в корзину %']]),orders:num(r[M['Заказы рекламы']]),
        cpo:num(r[M['CPO ₽']]),trend:r[M['Тренд']],ocenka:r[M['Оценка']],rec:r[M['Рекомендация']],
        spark:String(r[M['Расход по дням 15/16/17/18']]||'').split('/').map(x=>parseInt(x)).filter(x=>!isNaN(x)),tool};
      c.status=mapStatusJS(c.ocenka);
      if(tool==='Оплата за клик')ozkC.push(c);
    });
  }}
  // leader = top revenue among excellent
  const exc=ozkC.filter(c=>c.ocenka==='Отлично').sort((a,b)=>(b.rev||0)-(a.rev||0));
  if(exc[0])exc[0].status='leader';
  ozkC.sort((a,b)=>(b.spend||0)-(a.spend||0));
  beds.ozk={title:'ОЗК: Оплата за клик',sub:'Оплата за клик',...agg(ozkC),daily:dailyFromSheet(wb,'ОЗК'),status_dist:dist(ozkC),campaigns:ozkC};

  // ---- Медийная ----
  let md=sheetRows(wb,'медийка'),mdC=[];
  if(md){const hr=findHeader(md,['ID кампании','Название']);if(hr>=0){const M=colmap(md[hr]);
    md.slice(hr+1).forEach(r=>{if(!r||r[M['ID кампании']]==null||String(r[M['ID кампании']]).startsWith('ВСЕГО'))return;
      const days=num(r[M['Дней с откруткой']]);const isNew=String(r[M['Динамика']]||'')==='старт в июне'&&(days||0)<=16;
      const c={id:num(r[M['ID кампании']]),name:r[M['Название']],product:r[M['Название']],format:r[M['Формат']],
        spend:num(r[M['Расход ₽']]),rev:num(r[M['Выручка всего ₽']]),drr:num(r[M['ДРР %']]),cpc:num(r[M['CPC ₽']]),
        ctr:num(r[M['CTR %']]),cpm:num(r[M['CPM ₽']]),shows:num(r[M['Показы']]),clicks:num(r[M['Клики']]),
        orders:num(r[M['Заказы post-view, шт']]),postview:num(r[M['Доля post-view %']]),days,
        drr_may:num(r[M['ДРР май %']]),drr_jun:num(r[M['ДРР июнь %']]),spend_may:num(r[M['Расход май ₽']]),spend_jun:num(r[M['Расход июнь ₽']]),
        trend:r[M['Динамика']],ocenka:r[M['Оценка']],rec:r[M['Рекомендация']]};
      c.status=mapStatusJS(c.ocenka,false,isNew);mdC.push(c);
    });
    const me=mdC.filter(c=>c.ocenka==='Отлично').sort((a,b)=>(b.rev||0)-(a.rev||0));if(me[0])me[0].status='leader';
    mdC.sort((a,b)=>(b.spend||0)-(a.spend||0));
  }}
  beds.media={title:'Медийная реклама',sub:'Баннеры',...agg(mdC),daily:null,status_dist:dist(mdC),campaigns:mdC};

  // ---- ОЗЗ + Морковск ----
  let zz=sheetRows(wb,'ОЗЗ + Морковск'),zzC=[];
  if(zz){const hr=findHeader(zz,['SKU']);if(hr>=0){const M=colmap(zz[hr]);
    const last=Object.keys(M).filter(h=>/^Расход, ₽ \d{2}\.\d{2}$/.test(h)).map(h=>h.slice(-5));
    const ld=last[last.length-1];
    zz.slice(hr+1).forEach(r=>{if(!r||!r[M['SKU']]||String(r[M['SKU']]).startsWith('ВСЕГО'))return;
      const sp=last.map(d=>num(r[M['Расход, ₽ '+d]])).filter(x=>x!=null);
      const c={id:num(r[M['Ozon ID']])||r[M['SKU']],name:r[M['SKU']],product:r[M['SKU']],
        spend:num(r[M['Расход, ₽ '+ld]]),rev:num(r[M['Продажи в продвижении, ₽ '+ld]]),drr:num(r[M['ДРР, % '+ld]]),
        cpc:num(r[M['CPC, ₽ '+ld]]),orders:num(r[M['Заказы рекламы, шт '+ld]]),spark:sp.map(Math.round),comment:r[M['Комментарий']]};
      c.status=ozzStatusJS(c.comment);zzC.push(c);
    });
    zzC.sort((a,b)=>(b.spend||0)-(a.spend||0));
  }}
  beds.ozz={title:'ОЗЗ + Морковск',sub:'Оплата за заказ',...agg(zzC),daily:dailyFromSheet(wb,'ОЗЗ + Морковск'),status_dist:dist(zzC),campaigns:zzC};

  // ---- VK ----
  let vk=sheetRows(wb,'VK продвижение'),vkC=[],vkSum={orders:null,rev:null,spend:null,drr:null};
  if(vk){const hr=findHeader(vk,['Артикул','Ozon ID (SKU)']);
    if(hr>=0){const M=colmap(vk[hr]);
      vk.slice(hr+1).forEach(r=>{if(!r||!r[0]||String(r[0]).startsWith('ВСЕГО'))return;
        vkC.push({id:num(r[M['Ozon ID (SKU)']])||r[0],name:r[M['Название товара']]||r[0],product:r[M['Название товара']]||r[0],sku:r[0],
          orders:num(r[M['Заказов']]),qty:num(r[M['Кол-во, шт']]),rev:num(r[M['Выручка ₽']]),spend:num(r[M['Расход (ставка) ₽']]),
          drr:num(r[M['ДРР %']]),avg:num(r[M['Средний чек ₽']]),share:num(r[M['Доля выручки %']]),status:'good'});
      });
    }
    // summary scan
    vk.forEach(r=>{if(!r)return;const k=String(r[0]||'');
      if(k==='Заказов привлечено')vkSum.orders=num(r[1]);
      if(k==='Выручка, ₽')vkSum.rev=num(r[1]);
      if(k==='Расход (ставка), ₽')vkSum.spend=num(r[1]);
      if(k==='ДРР, %')vkSum.drr=num(r[1]);
    });
  }
  beds.vk={title:'VK и внешнее продвижение',sub:'Модель CPA',
    spend:vkSum.spend??agg(vkC).spend,rev:vkSum.rev??agg(vkC).rev,drr:vkSum.drr??agg(vkC).drr,
    orders:vkSum.orders??agg(vkC).orders,count:vkC.length,daily:null,status_dist:dist(vkC),campaigns:vkC};

  // ---- overall ----
  const tot=['ozk','media','ozz','vk'].reduce((a,k)=>{a.spend+=beds[k].spend||0;a.rev+=beds[k].rev||0;a.orders+=beds[k].orders||0;return a;},{spend:0,rev:0,orders:0});
  return {report_date,period:report_date,generated:new Date().toISOString().slice(0,10),beds,
    overall:{spend:Math.round(tot.spend),rev:Math.round(tot.rev),drr:tot.rev?Math.round(tot.spend/tot.rev*1000)/10:0,orders:Math.round(tot.orders)}};
}
function agg(cs){const s=cs.reduce((a,c)=>a+(c.spend||0),0),r=cs.reduce((a,c)=>a+(c.rev||0),0),o=cs.reduce((a,c)=>a+(c.orders||0),0);return {spend:Math.round(s),rev:Math.round(r),drr:r?Math.round(s/r*1000)/10:0,orders:Math.round(o),count:cs.length};}
function dist(cs){const d={};cs.forEach(c=>d[c.status]=(d[c.status]||0)+1);return d;}

/* ---------- weekly buckets for ОЗК daily series (calendar weeks, Пн–Вс) ---------- */
function weeksOf(daily){
  if(!daily||!daily.length)return [];
  const pts=daily.map(p=>{const mm=(p.d||'').match(/(\d{2})\.(\d{2})/);const dt=mm?new Date(2026,+mm[2]-1,+mm[1]):null;return {p,dt};}).filter(x=>x.dt);
  const wk={};
  pts.forEach(({p,dt})=>{const day=(dt.getDay()+6)%7;const mon=new Date(dt);mon.setDate(dt.getDate()-day);const key=mon.toISOString().slice(0,10);(wk[key]=wk[key]||[]).push(p);});
  return Object.keys(wk).sort().map(key=>{const arr=wk[key];const from=arr[0].d,to=arr[arr.length-1].d;
    const clean=arr.filter(x=>!x.gap);
    const sp=clean.reduce((s,x)=>s+(x.spend||0),0),rv=clean.reduce((s,x)=>s+(x.rev||0),0);
    return {label:from+'–'+to,from,to,pts:arr,spend:sp,rev:rv,drr:rv>0?+(sp/rv*100).toFixed(1):0};});
}

function rThesis(s){const dr=s.c.dr,drev=s.drev;
  if(s.st==='loss'){if(dr>30)return `ДРР ${pctv(dr)} — убыточно${drev!=null&&drev<-15?', выручка падает':''}`;return 'Расход без заказов';}
  if(s.st==='success')return `ДРР ${pctv(dr)} в цели, выручка ${drev>=0?'+':''}${drev}%`;
  if(s.st==='stable')return `Эффективно (ДРР ${pctv(dr)})${drev>10?', растёт':''}`;
  return 'Нет открутки';}
function rAction(s){
  if(s.st==='loss')return s.c.dr>40?'Пауза/пересборка, снизить ставку, проверить цену':'Снизить ставку 15–30%, оптимизировать запросы';
  if(s.st==='success')return 'Масштабировать +10–20%, держать ДРР ≤30%';
  if(s.st==='stable')return 'Наращивать охват и ставку';
  return 'Перезапуск или архив';}
function rProblem(s){if(s.st==='loss')return s.c.dr>30?`ДРР ${pctv(s.c.dr)} — убыточно`:'Расход без заказов';if(s.ddrr>3)return `ДРР вырос на ${s.ddrr} п.п.`;if(s.drev<-15)return `Выручка ${s.drev}% н/н`;return 'CTR/конверсия под давлением';}
function rHypo(s){if(s.c.ct<1)return 'Низкий CTR — слабое главное фото/цена';if(s.c.crc<15)return 'Низкая конверсия в корзину — карточка/отзывы';if(s.c.dr>30)return 'Неэффективные ключи/высокая ставка';return 'Цена/контент карточки';}

function rKeyEvents(A){
  const c=A.cur,p=A.prev;const items=A.items;
  const top=items.slice().sort((a,b)=>b.dre-a.dre)[0];
  const worst=items.slice().sort((a,b)=>a.dre-b.dre)[0];
  const ev=[];
  ev.push([rpc(c.rev,p.rev)>=0,`Выручка рекламы ${rpc(c.rev,p.rev)>=0?'+':''}${rpc(c.rev,p.rev).toFixed(0)}% н/н`]);
  ev.push([c.drr-p.drr<=0,`ДРР ${c.drr-p.drr>0?'вырос':'снизился'} до ${pctv(c.drr)} (${c.drr-p.drr>0?'+':''}${(c.drr-p.drr).toFixed(1)} п.п.)`]);
  ev.push([rpc(c.ctr,p.ctr)>=0,`CTR ${rpc(c.ctr,p.ctr)>=0?'вырос':'снизился'} — ${pctv(c.ctr)}`]);
  if(top)ev.push([true,`Лучший рост: ${top.sku} +${fmt(top.dre)} ₽`]);
  if(worst&&worst.dre<0)ev.push([false,`Под давлением: ${worst.sku} ${fmt(worst.dre)} ₽`]);
  return ev.map(e=>`<div class="rev-i"><span class="rev-ar ${e[0]?'up':'dn'}">${e[0]?'▲':'▼'}</span>${e[1]}</div>`).join('');
}

function rdonut(parts){
  const tot=parts.reduce((s,p)=>s+p[1],0);const denom=tot||1;let a=-90,segs='';
  parts.forEach(p=>{const ang=p[1]/denom*360;if(p[1]>0){const[x0,y0]=polar(60,60,46,a),[x1,y1]=polar(60,60,46,a+ang);const large=ang>180?1:0;
    segs+=`<path d="M ${x0.toFixed(1)} ${y0.toFixed(1)} A 46 46 0 ${large} 1 ${x1.toFixed(1)} ${y1.toFixed(1)}" fill="none" stroke="${p[2]}" stroke-width="16"/>`;a+=ang;}});
  if(!tot)segs=`<circle cx="60" cy="60" r="46" fill="none" stroke="#EEF1F7" stroke-width="16"/>`;
  return `<svg viewBox="0 0 120 120" class="rdonut">${segs}<text x="60" y="56" font-size="26" font-weight="800" fill="#1A2B45" text-anchor="middle">${tot}</text><text x="60" y="74" font-size="10" fill="#9AA3B0" text-anchor="middle">тестов</text></svg>`;
}

/* карта артикулов кабинета (bubble) */
function rbubbles(items,tint){
  const W=620,H=300,pad=46;
  const xs=items.map(s=>Math.min(s.c.dr,80));const ys=items.map(s=>Math.max(-60,Math.min(120,s.drev==null?0:s.drev)));
  const maxRev=Math.max(1,...items.map(s=>s.c.re));
  const xsc=v=>pad+v/80*(W-pad*1.4);const ysc=v=>H-pad-(v+60)/180*(H-pad*1.6);
  let g='';
  g+=`<line x1="${pad}" y1="${ysc(0)}" x2="${W-pad*0.4}" y2="${ysc(0)}" stroke="#E3E8F0" stroke-dasharray="4 4"/>`;
  g+=`<line x1="${xsc(25)}" y1="${pad*0.5}" x2="${xsc(25)}" y2="${H-pad}" stroke="#CFE3D5" stroke-dasharray="4 4"/><text x="${xsc(25)}" y="${pad*0.5-2}" font-size="9" fill="#16A34A" text-anchor="middle">ДРР 25%</text>`;
  g+=`<line x1="${xsc(30)}" y1="${pad*0.5}" x2="${xsc(30)}" y2="${H-pad}" stroke="#F4D2D2" stroke-dasharray="4 4"/><text x="${xsc(30)}" y="${pad*0.5-2}" font-size="9" fill="#E5484D" text-anchor="middle">30%</text>`;
  items.forEach(s=>{const r=4+Math.sqrt(s.c.re/maxRev)*22;const col=ST[s.st]?ST[s.st].color:'#999';
    g+=`<circle cx="${xsc(Math.min(s.c.dr,80)).toFixed(1)}" cy="${ysc(Math.max(-60,Math.min(120,s.drev==null?0:s.drev))).toFixed(1)}" r="${r.toFixed(1)}" fill="${col}" fill-opacity="0.5" stroke="${col}" stroke-width="1.4"><title>${esc(s.sku)} · ДРР ${s.c.dr}% · Δвыр ${s.drev}%</title></circle>`;});
  return `<div class="rbub"><svg viewBox="0 0 ${W} ${H}">${g}
    <text x="${W-pad*0.4}" y="${H-pad+18}" font-size="10" fill="#9AA3B0" text-anchor="end">ДРР, % →</text>
    <text x="${pad-8}" y="${pad*0.5+4}" font-size="10" fill="#9AA3B0">↑ Δ выручки, %</text></svg>
    <div class="rbub-leg">${ST_ORDER.map(k=>`<span class="rtl"><span class="rtl-d" style="background:${ST[k].color}"></span>${ST[k].label}</span>`).join('')}<span class="rbub-note">размер = вклад в выручку</span></div></div>`;
}

  let rows='';for(let i=0;i<5;i++){rows+=`<tr><td><textarea class="rsol-done" data-k="${esc('dec:'+i+':what')}" placeholder="Решение…">${esc(RetroStore.get('dec:'+i+':what'))}</textarea></td>
    <td><input class="rin" data-k="${esc('dec:'+i+':who')}" placeholder="Ответственный" value="${esc(RetroStore.get('dec:'+i+':who'))}"></td>
    <td><input class="rin rin-s" data-k="${esc('dec:'+i+':due')}" placeholder="Срок" value="${esc(RetroStore.get('dec:'+i+':due'))}"></td></tr>`;}
  return `<div class="rslide">${rsHead('Решения руководства','Что решили и кто отвечает')}
    <table class="rsol rsol-dec"><thead><tr><th>Решение</th><th>Ответственный</th><th>Срок</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}
/* план следующей недели — топ-5 */
function rSlideNext(){
  let rows='';for(let i=0;i<5;i++){rows+=`<div class="rnext-i"><span class="rnext-n">${i+1}</span><input class="rin" data-k="${esc('next:'+i)}" placeholder="Приоритет ${i+1}…" value="${esc(RetroStore.get('next:'+i))}"></div>`;}
  return `<div class="rslide">${rsHead('План следующей недели','Топ-5 приоритетов кабинета')}
    <div class="rnext">${rows}</div>
    <div class="rnext-foot">Данные: внутренняя аналитика кабинета Big-L · ${RETRO.wkCur}</div></div>`;
}

function rSlides(){
  const sl=[{t:'Welcome',h:rSlideWelcome}];
  sl.push({t:'Пульс кабинета',h:()=>rSlidePulse(RETRO.skus,'Пульс кабинета BIG-L','Big-L · qeep + Harly',true)});
  sl.push({t:'Двигатели роста',h:rSlideDrivers});
  sl.push({t:'Пульс qeep',h:()=>rSlidePulse(rBrand('qeep'),'Пульс бренда qeep','БАДы + Косметика',false)});
  sl.push({t:'Пульс Harly',h:()=>rSlidePulse(rBrand('Harly'),'Пульс бренда Harly','Зоотовары',false)});
  R_DIRS.forEach(d=>{
    sl.push({t:d[0]+' · картина',h:()=>rSlideDirOverview(d[0])});
    sl.push({t:d[0]+' · вклад SKU',h:()=>rSlideDirContrib(d[0])});
    sl.push({t:d[0]+' · кейсы',h:()=>rSlideDirCases(d[0])});
    sl.push({t:d[0]+' · тесты/планы',h:()=>rSlideDirTests(d[0])});
  });
  sl.push({t:'Карта артикулов',h:rSlideMap});
  sl.push({t:'Под контролем',h:rSlideControl});
  sl.push({t:'Работа команды',h:rSlideTeam});
  sl.push({t:'Ретро недели',h:rSlideWeek4});
  sl.push({t:'Решения',h:rSlideDecisions});
  sl.push({t:'План недели',h:rSlideNext});

}

/* ---- экспорт презентации ---- */
function rLoadLib(src,glob){return new Promise((res,rej)=>{if(window[glob])return res();const sc=document.createElement('script');sc.src=src;sc.onload=()=>res();sc.onerror=()=>rej(new Error('load '+src));document.head.appendChild(sc);});}
function rExportPDF(){
  const slides=rSlides();
  const old=document.getElementById('rprint');if(old)old.remove();
  const box=document.createElement('div');box.id='rprint';
  box.innerHTML=slides.map(s=>`<div class="rprint-page"><div class="rstage">${s.h()}</div></div>`).join('');
  document.body.appendChild(box);
  setTimeout(()=>{window.print();setTimeout(()=>box.remove(),800);},60);
}
async function rCapture(html,width){
  const box=document.createElement('div');
  box.style.cssText=`position:fixed;left:-99999px;top:0;width:${width}px;background:#fff;box-sizing:border-box`;
  box.innerHTML=`<div class="rstage" style="box-shadow:none;border:none;border-radius:0">${html}</div>`;
  document.body.appendChild(box);
  const canvas=await html2canvas(box,{scale:2,backgroundColor:'#ffffff',logging:false,useCORS:true,windowWidth:width});
  box.remove();
  return canvas.toDataURL('image/png');
}
async function rExportPPTX(btn){
  if(btn)btn.disabled=true;
  toast('Готовлю PPTX… загружаю библиотеки');
  try{
    await rLoadLib('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js','html2canvas');
    await rLoadLib('https://cdnjs.cloudflare.com/ajax/libs/pptxgenjs/3.12.0/pptxgen.bundle.js','PptxGenJS');
    const pptx=new PptxGenJS();pptx.defineLayout({name:'W169',width:13.33,height:7.5});pptx.layout='W169';
    pptx.author='Рекламный трекер';pptx.title='Ретроспектива '+RETRO.wkCur;
    const slides=rSlides();
    for(let k=0;k<slides.length;k++){
      toast(`Рендер слайда ${k+1} из ${slides.length}…`);
      const data=await rCapture(slides[k].h(),1280);
      const im=new Image();await new Promise(r=>{im.onload=r;im.onerror=r;im.src=data;});
      const ar=(im.width&&im.height)?im.width/im.height:16/9;
      let w=13.33,h=w/ar,x=0,y=(7.5-h)/2;
      if(h>7.5){h=7.5;w=h*ar;x=(13.33-w)/2;y=0;}
      const sl=pptx.addSlide();sl.background={color:'FFFFFF'};
      sl.addImage({data,x,y,w,h});
    }
    await pptx.writeFile({fileName:'Ретроспектива_'+RETRO.wkCur.replace(/[^0-9.]/g,'')+'.pptx'});
    toast('PPTX готов — файл скачан');
  }catch(e){toast('Не удалось собрать PPTX (нет доступа к CDN?). Используйте «Скачать PDF».',true);}
  if(btn)btn.disabled=false;
}

/* ---- Excel-шаблоны: скачивание / загрузка / применение ---- */
function rB64Blob(b64,mime){const bin=atob(b64);const a=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return new Blob([a],{type:mime});}
function rDownloadTpl(t){
  const names={qeep:'Шаблон_qeep.xlsx',harly:'Шаблон_harly.xlsx',rop:'Шаблон_РОПа.xlsx'};
  if(!RT_TPL[t])return toast('Шаблон недоступен',true);
  const url=URL.createObjectURL(rB64Blob(RT_TPL[t],'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'));
  const a=document.createElement('a');a.href=url;a.download=names[t];document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1500);toast('Скачан: '+names[t]);
}
function rApplyWorkbook(wb){let n=0;
  wb.SheetNames.forEach(sn=>{const ws=wb.Sheets[sn];if(!ws)return;
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,defval:''});
    rows.forEach(row=>{const key=(row[5]==null?'':row[5]).toString().trim();if(!key)return;
      let val=row[1];if(val==null)return;val=val.toString().trim();if(val==='')return;
      if(/^(t:|tz:|rt:)/.test(key)){const num=parseFloat(val.replace(/\s/g,'').replace(',','.'));if(!isNaN(num))RetroStore.set(key,Math.round(num));}
      else RetroStore.set(key,val);
      n++;});
  });
  return n;
}
function rUploadTpl(){
  if(typeof XLSX==='undefined')return toast('Библиотека Excel не загрузилась (нет сети?)',true);
  const inp=document.createElement('input');inp.type='file';inp.accept='.xlsx,.xls';
  inp.onchange=e=>{const f=e.target.files&&e.target.files[0];if(!f)return;toast('Читаю шаблон…');
    const rd=new FileReader();
    rd.onload=ev=>{try{const wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'});const n=rApplyWorkbook(wb);viewRetro();toast(n?('Обновлено полей: '+n):'Заполненных полей не найдено',!n);}catch(err){toast('Не удалось прочитать файл',true);}};
    rd.readAsArrayBuffer(f);};
  inp.click();
}
/* ---- режим трансляции (полноэкранная презентация) ---- */
function rPresent(){
  if(document.getElementById('rpres'))return;
  const ov=document.createElement('div');ov.id='rpres';document.body.appendChild(ov);
  const slides=rSlides();
  const go2=d=>{STATE.retroSlide=Math.max(0,Math.min(slides.length-1,(STATE.retroSlide||0)+d));paint();};
  const paint=()=>{const i=STATE.retroSlide||0;
    ov.innerHTML=`<div class="rpres-bar"><span>${i+1} / ${slides.length} · ${esc(slides[i].t)}</span><button id="rpx">✕ Выход (Esc)</button></div>
      <div class="rpres-stage"><div class="rstage">${slides[i].h()}</div></div>
      <div class="rpres-nav"><button id="rpprev" ${i===0?'disabled':''}>←</button><button id="rpnext" ${i===slides.length-1?'disabled':''}>→</button></div>`;
    document.getElementById('rpx').onclick=close;
    document.getElementById('rpprev').onclick=()=>go2(-1);document.getElementById('rpnext').onclick=()=>go2(1);};
  const key=e=>{if(e.key==='Escape')close();else if(e.key==='ArrowRight'||e.key===' ')go2(1);else if(e.key==='ArrowLeft')go2(-1);};
  function close(){document.removeEventListener('keydown',key);ov.remove();if(document.fullscreenElement&&document.exitFullscreen)document.exitFullscreen().catch(()=>{});}
  document.addEventListener('keydown',key);
  if(document.documentElement.requestFullscreen)document.documentElement.requestFullscreen().catch(()=>{});
  paint();toast('Трансляция · стрелки ← → · Esc — выход');
}

function viewRetro(){
  const m=document.getElementById('main');m.innerHTML='';
  const slides=rSlides();
  if(STATE.retroSlide==null||STATE.retroSlide>=slides.length)STATE.retroSlide=0;
  const i=STATE.retroSlide,cur=slides[i];
  const wrap=el('div','rdeck');
  wrap.innerHTML=`<div class="rnav">
      <button class="rnav-btn" id="rPrev" ${i===0?'disabled':''}>← Назад</button>
      <div class="rtools">
        <div class="rxls" id="rXlsWrap"><button class="rtool-btn" id="rXls">⊞ Excel-шаблон ▾</button>
          <div class="rxls-menu" id="rXlsMenu">
            <div class="rxls-h">Скачать для заполнения</div>
            <button data-t="qeep">Шаблон qeep <span>Пульс qeep · БАДы · Косметика</span></button>
            <button data-t="harly">Шаблон harly <span>Пульс Harly · Зоотовары</span></button>
            <button data-t="rop">Шаблон РОПа <span>кабинет · карта · команда · решения · план</span></button>
          </div></div>
        <button class="rtool-btn" id="rUp">↑ Загрузить шаблон</button>
        <button class="rtool-btn accent" id="rPlay">▶ Трансляция</button>
      </div>
      <div class="rexp"><button class="rexp-btn" id="rPDF">Скачать PDF</button><button class="rexp-btn ghost" id="rPPTX">PPTX</button>
      <button class="rnav-btn" id="rNext" ${i===slides.length-1?'disabled':''}>Вперёд →</button></div></div>
    <div class="rnav2"><span class="rnav-ttl">${cur.t}</span><span class="rnav-cnt">${i+1} / ${slides.length}</span></div>
    <div class="rstage">${cur.h()}</div>
    <div class="rdots">${slides.map((s,k)=>`<span class="rdot ${k===i?'on':''}" data-i="${k}" title="${esc(s.t)}"></span>`).join('')}</div>`;
  m.appendChild(wrap);
  const set=k=>{STATE.retroSlide=Math.max(0,Math.min(slides.length-1,k));viewRetro();window.scrollTo(0,0);};
  setTimeout(()=>{
    const pv=document.getElementById('rPrev'),nx=document.getElementById('rNext');
    if(pv)pv.onclick=()=>set(i-1);if(nx)nx.onclick=()=>set(i+1);
    document.querySelectorAll('.rdot').forEach(d=>d.onclick=()=>set(+d.getAttribute('data-i')));
    document.querySelectorAll('textarea[data-k],input[data-k]').forEach(t=>{t.onchange=()=>{RetroStore.set(t.getAttribute('data-k'),t.value);toast('Сохранено');};});
    document.querySelectorAll('input[data-tn]').forEach(inp=>{inp.onchange=()=>{RetroStore.set(inp.getAttribute('data-tn'),+inp.value||0);if(['ok','wip','no','run'].some(x=>inp.getAttribute('data-tn').endsWith(x)))viewRetro();else toast('Сохранено');};});
    const pdfb=document.getElementById('rPDF');if(pdfb)pdfb.onclick=()=>rExportPDF();
    const pptxb=document.getElementById('rPPTX');if(pptxb)pptxb.onclick=()=>rExportPPTX(pptxb);
    const xls=document.getElementById('rXls'),xlsMenu=document.getElementById('rXlsMenu');
    if(xls)xls.onclick=()=>xlsMenu.classList.toggle('show');
    document.querySelectorAll('#rXlsMenu button[data-t]').forEach(b=>b.onclick=()=>{rDownloadTpl(b.getAttribute('data-t'));xlsMenu.classList.remove('show');});
    const up=document.getElementById('rUp');if(up)up.onclick=()=>rUploadTpl();
    const play=document.getElementById('rPlay');if(play)play.onclick=()=>rPresent();
  },0);
  if(!window.__rKeys){window.__rKeys=true;document.addEventListener('keydown',e=>{if(STATE.view!=='retro')return;const tag=(e.target.tagName||'').toLowerCase();if(tag==='textarea'||tag==='input')return;if(e.key==='ArrowRight')set((STATE.retroSlide||0)+1);if(e.key==='ArrowLeft')set((STATE.retroSlide||0)-1);});}
}


const NAV=[['tracker','Трекер',I.garden],['retro','Ретроспектива',I.retro],['stock','Доступность товара',I.stock],['uploads','Загрузка данных',I.uploads],['settings','Настройки',I.settings]];
function buildNav(){
  const n=document.getElementById('nav');n.innerHTML='';
  NAV.forEach(([id,label,ic])=>{
    const active = STATE.view===id
      || (id==='tracker'&&['bed','camp','garden','camp_list','archive','compare','analytics'].includes(STATE.view));
    const b=el('button',active?'active':'');
    b.innerHTML=`<span class="ic">${ic}</span>${label}`;
    b.onclick=()=>go(id);
    n.appendChild(b);
  });
}
function go(view,opt){opt=opt||{};if(opt.bed!=null&&opt.bed!==STATE.bed)STATE.week=null;STATE.view=view;if(opt.bed!=null)STATE.bed=opt.bed;if(opt.camp!=null)STATE.camp=opt.camp;window.scrollTo(0,0);render();}
function render(){_stockMap=null;
  prepBeds(STATE.snap);
  document.getElementById('foot-date').textContent=STATE.snap.report_date;
  buildNav();
  const v=STATE.view;
  if(v==='tracker')viewTracker();
  else if(v==='stock')viewStock();
  else if(v==='artdash'){STATE.view='tracker';STATE.trkView='arts';viewTracker();}
  else if(v==='bed')viewBed();
  else if(v==='camp')viewCamp();
  else if(v==='retro')viewRetro();
  else if(v==='camp_list')viewCampList();
  else if(v==='archive')viewArchive();
  else if(v==='compare')viewCompare();
  else if(v==='analytics')viewAnalytics();
  else if(v==='uploads')viewUploads();
  else if(v==='settings')viewSettings();
  else viewTracker();
}
document.getElementById('fileInput').addEventListener('change',e=>{if(e.target.files[0]){handleFile(e.target.files[0]);e.target.value='';}});
setCurrentToLatest();
render();
